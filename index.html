<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Round Robin Bracketology Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #081828; overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #081828; }
  ::-webkit-scrollbar-thumb { background: #1A3050; border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useCallback, useMemo, useEffect, memo } = React;

const DATA_URL = "https://grantbh12.github.io/The-Round-Robin/teams.json";

function LoadingScreen() {
  return (
    <div style={{ minHeight:"100vh", background:"#081828", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column" }}>
      <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:"-0.03em", background:"linear-gradient(135deg,#E8872B,#F0A855)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", fontFamily:"'Segoe UI','Inter',system-ui,sans-serif" }}>The Round Robin Bracketology Hub</h1>
      <p style={{ color:"#4A5568", fontSize:13, marginTop:8, fontFamily:"'Segoe UI',system-ui,sans-serif" }}>Loading team data...</p>
    </div>
  );
}

function ErrorScreen({ error, onRetry }) {
  return (
    <div style={{ minHeight:"100vh", background:"#081828", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", fontFamily:"'Segoe UI','Inter',system-ui,sans-serif" }}>
      <h1 style={{ fontSize:20, color:"#F87171", marginBottom:8 }}>Failed to load data</h1>
      <p style={{ color:"#4A5568", fontSize:12, marginBottom:16 }}>{error}</p>
      <button onClick={onRetry} style={{ background:"#E8872B", border:"none", borderRadius:6, color:"#fff", fontSize:13, padding:"8px 20px", cursor:"pointer" }}>Retry</button>
    </div>
  );
}

function St({ l, v }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between" }}>
      <span style={{ color:"#4A5568" }}>{l}</span>
      <span style={{ color:"#E8872B", fontFamily:"monospace" }}>{v}</span>
    </div>
  );
}

// TeamCard defined OUTSIDE App — prevents React from remounting scroll containers
const TeamCard = memo(function TeamCard({ tid, tm, selected, dragTid, onMouseDown, zone }) {
  const t = tm[tid];
  if (!t) return null;
  const isSel = selected === tid;
  const isDragging = dragTid === tid;
  const inPool = zone === "pool";
  return (
    <div
      data-card={tid}
      onMouseDown={e => { e.stopPropagation(); onMouseDown(e, tid); }}
      style={{
        background: isSel ? "rgba(232,135,43,0.15)" : "#0D2240",
        border: `1.5px solid ${isSel ? "#E8872B" : "#1A3050"}`,
        borderRadius:6, padding:"5px 8px",
        cursor: isDragging ? "grabbing" : "grab",
        userSelect:"none", marginBottom:3, transition: isDragging ? "none" : "all 0.12s",
        boxShadow: isSel ? "0 0 0 1px #E8872B" : "none",
        opacity: isDragging ? 0.35 : 1,
      }}
    >
      <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:12 }}>
        {t.logo && <img src={t.logo} alt="" style={{ width:20, height:20, objectFit:"contain", flexShrink:0 }} onError={e => e.target.style.display="none"}/>}
        {inPool && <span style={{ color:"#6B7A90", fontFamily:"monospace", fontSize:10, minWidth:22, textAlign:"right" }}>{t.net}</span>}
        <span style={{ color:"#E2E8F0", fontWeight:600, flex:1, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", fontSize:12 }}>{t.name}</span>
        <span style={{ color:"#4A5568", fontSize:9 }}>{t.conf}</span>
        <span style={{ color:"#E8872B", fontSize:11, fontFamily:"monospace" }}>{t.record}</span>
      </div>
    </div>
  );
});

let REAL_TEAMS = [];
let DATA_SCRAPED_AT = "";

const SEEDS = Array.from({length:16},(_,i)=>({id:`seed${i+1}`,label:`${i+1}`,num:i+1,max:(i===10||i===15)?6:4}));
const EXTRA_TIERS = [
  {id:"ffo",label:"First Four Out",ac:"#8B4444"},
  {id:"nfo",label:"Next Four Out",ac:"#6B3A3A"},
  {id:"ac",label:"Also Considered",ac:"#555B6E"},
];
const COMPARE = "compare";
const POOL = "pool";
const DRAG_THRESHOLD = 6;
const SEED_COLORS = ["#E8872B","#D97A28","#C06128","#A84E26","#4A6FA5","#3D5E8C","#3D5E8C","#304D73","#304D73","#2A4060","#2A4060","#7A5A3A","#7A5A3A","#606060","#606060","#505050"];

function App() {
  const teams = useMemo(() => REAL_TEAMS, []);
  const tm = useMemo(() => Object.fromEntries(teams.map(t => [t.id, t])), [teams]);
  const allConfs = useMemo(() => ["All", ...[...new Set(teams.map(t => t.conf))].sort()], [teams]);

  const [asgn, setAsgn] = useState(() => {
    const a = {};
    SEEDS.forEach(s => a[s.id] = []);
    EXTRA_TIERS.forEach(t => a[t.id] = []);
    a[COMPARE] = [];
    a[POOL] = teams.map(t => t.id);
    return a;
  });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const val = localStorage.getItem("bracketology-board-state");
        if (val) {
          const saved = JSON.parse(val);
          const allIds = new Set(teams.map(t => t.id));
          const usedIds = new Set();
          let valid = true;
          for (const k in saved) {
            if (!Array.isArray(saved[k])) { valid = false; break; }
            for (const id of saved[k]) {
              if (!allIds.has(id)) { valid = false; break; }
              usedIds.add(id);
            }
          }
          if (valid && usedIds.size > 0) {
            const missing = teams.filter(t => !usedIds.has(t.id)).map(t => t.id);
            // Safeguard for newly added zones preventing LocalStorage crashes
            if (!saved[POOL]) saved[POOL] = [];
            if (!saved[COMPARE]) saved[COMPARE] = [];
            SEEDS.forEach(s => { if (!saved[s.id]) saved[s.id] = []; });
            EXTRA_TIERS.forEach(t => { if (!saved[t.id]) saved[t.id] = []; });
            
            saved[POOL] = [...saved[POOL], ...missing];
            setAsgn(saved);
          }
        }
      } catch(e) {}
      setLoaded(true);
    })();
  }, [teams]);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem("bracketology-board-state", JSON.stringify(asgn)); } catch(e) {}
  }, [asgn, loaded]);

  const [search, setSearch] = useState("");
  const [confFs, setConfFs] = useState(new Set());
  const METRICS = [
    {key:"net",label:"NET"},
    {key:"sos",label:"SOS"},
    {key:"kpi",label:"KPI"},
    {key:"sor",label:"SOR"},
    {key:"wab",label:"WAB"},
    {key:"bpi",label:"BPI"},
    {key:"pom",label:"KenPom"},
    {key:"tRank",label:"T-Rank"},
  ];
  const [metricRanges, setMetricRanges] = useState(() => {
    const r = {};
    ["net","sos","kpi","sor","wab","bpi","pom","tRank"].forEach(k => r[k] = [1, 400]);
    return r;
  });
  const anyFilterActive = confFs.size > 0 || Object.values(metricRanges).some(([mn,mx]) => mn > 1 || mx < 400);
  const clearFilters = () => {
    setConfFs(new Set());
    setMetricRanges({net:[1,400],sos:[1,400],kpi:[1,400],sor:[1,400],wab:[1,400],bpi:[1,400],pom:[1,400],tRank:[1,400]});
  };
  const [selected, setSelected] = useState(null);
  const [compareOpen, setCompareOpen] = useState(true);
  const [dragTid, setDragTid] = useState(null);
  const [dropZone, setDropZone] = useState(null);
  const [insertTarget, setInsertTarget] = useState(null);
  const [includeBubbleTiers, setIncludeBubbleTiers] = useState(false);
  const [toastMsg, setToastMsg] = useState("");

  const dragRef = useRef({tid:null, startX:0, startY:0, dragging:false, zoneRef:null, insertRef:null});
  const ghostRef = useRef(null);
  const boardScrollRef = useRef(null);
  const poolScrollRef = useRef(null);

  const findZone = useCallback(tid => {
    for (const k in asgn) { if (asgn[k].includes(tid)) return k; }
    return null;
  }, [asgn]);

  const moveTeam = useCallback((tid, target, beforeTid = null) => {
    setAsgn(p => {
      const n = {};
      for (const k in p) n[k] = p[k].filter(x => x !== tid);
      if (target === POOL) {
        const teamNet = tm[tid]?.net ?? 999;
        const pool = n[POOL];
        let idx = pool.length;
        for (let i = 0; i < pool.length; i++) {
          if ((tm[pool[i]]?.net ?? 999) > teamNet) { idx = i; break; }
        }
        pool.splice(idx, 0, tid);
      } else if (beforeTid && n[target].includes(beforeTid)) {
        const idx = n[target].indexOf(beforeTid);
        n[target].splice(idx, 0, tid);
      } else {
        n[target] = [...n[target], tid];
      }
      return n;
    });
  }, [tm]);

  const handleZoneClick = useCallback(zoneId => {
    if (!selected) return;
    const seed = SEEDS.find(s => s.id === zoneId);
    if (seed && asgn[zoneId].length >= seed.max && !asgn[zoneId].includes(selected)) return;
    if (zoneId === COMPARE && asgn[COMPARE].length >= 8 && !asgn[COMPARE].includes(selected)) return;
    moveTeam(selected, zoneId);
    setSelected(null);
  }, [selected, asgn, moveTeam]);

  const sendFromCompare = useCallback((tid, target) => {
    moveTeam(tid, target);
  }, [moveTeam]);

  const handleMouseDown = useCallback((e, tid) => {
    if (e.button !== 0) return;
    e.preventDefault();
    dragRef.current = { tid, startX:e.clientX, startY:e.clientY, dragging:false, zoneRef:null, insertRef:null };

    const onMouseMove = (mv) => {
      const dx = mv.clientX - dragRef.current.startX;
      const dy = mv.clientY - dragRef.current.startY;
      if (!dragRef.current.dragging && Math.sqrt(dx*dx+dy*dy) > DRAG_THRESHOLD) {
        dragRef.current.dragging = true;
        if (ghostRef.current) {
          ghostRef.current.textContent = `#${tm[tid]?.net}  ${tm[tid]?.name}`;
          ghostRef.current.style.left = (mv.clientX+12)+"px";
          ghostRef.current.style.top = (mv.clientY-10)+"px";
          ghostRef.current.style.display = "block";
        }
        setDragTid(tid);
        setSelected(null);
      }
      if (dragRef.current.dragging) {
        if (ghostRef.current) {
          ghostRef.current.style.left = (mv.clientX+12)+"px";
          ghostRef.current.style.top = (mv.clientY-10)+"px";
        }
        // Find which zone we're over
        let foundZone = null;
        const zoneEls = document.querySelectorAll("[data-zone]");
        for (const el of zoneEls) {
          const r = el.getBoundingClientRect();
          if (mv.clientX>=r.left && mv.clientX<=r.right && mv.clientY>=r.top && mv.clientY<=r.bottom) {
            foundZone = el.getAttribute("data-zone"); break;
          }
        }
        // Find insert position within zone by hit-testing individual cards
        let foundInsert = null;
        if (foundZone && foundZone !== POOL) {
          const cardEls = document.querySelectorAll("[data-card]");
          for (const el of cardEls) {
            const cardTid = el.getAttribute("data-card");
            if (cardTid === tid) continue;
            const r = el.getBoundingClientRect();
            if (mv.clientX>=r.left && mv.clientX<=r.right && mv.clientY>=r.top && mv.clientY<=r.bottom) {
              const midY = r.top + r.height / 2;
              const midX = r.left + r.width / 2;
              // For compare zone (horizontal), use X axis; for seed lines (wrapping), use Y
              const insertBefore = foundZone === COMPARE ? mv.clientX < midX : mv.clientY < midY;
              foundInsert = { zone: foundZone, beforeTid: insertBefore ? cardTid : null, afterTid: insertBefore ? null : cardTid };
              break;
            }
          }
        }
        const zoneChanged = foundZone !== dragRef.current.zoneRef;
        const insertKey = foundInsert ? `${foundInsert.beforeTid}:${foundInsert.afterTid}` : null;
        const prevInsertKey = dragRef.current.insertRef ? `${dragRef.current.insertRef.beforeTid}:${dragRef.current.insertRef.afterTid}` : null;
        if (zoneChanged || insertKey !== prevInsertKey) {
          dragRef.current.zoneRef = foundZone;
          dragRef.current.insertRef = foundInsert;
          setDropZone(foundZone);
          setInsertTarget(foundInsert);
        }
      }
    };

    const onMouseUp = () => {
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
      if (ghostRef.current) ghostRef.current.style.display = "none";
      if (dragRef.current.dragging) {
        const targetZone = dragRef.current.zoneRef;
        const insert = dragRef.current.insertRef;
        if (targetZone) {
          const seed = SEEDS.find(s => s.id === targetZone);
          const atMax = seed
            ? (asgn[targetZone].length >= seed.max && !asgn[targetZone].includes(tid))
            : (targetZone === COMPARE && asgn[COMPARE].length >= 8 && !asgn[COMPARE].includes(tid));
          if (!atMax) {
            let beforeTid = null;
            if (insert && insert.zone === targetZone) {
              if (insert.beforeTid) {
                beforeTid = insert.beforeTid;
              } else if (insert.afterTid) {
                const zoneList = asgn[targetZone].filter(x => x !== tid);
                const afterIdx = zoneList.indexOf(insert.afterTid);
                beforeTid = afterIdx >= 0 && afterIdx + 1 < zoneList.length ? zoneList[afterIdx + 1] : null;
              }
            }
            moveTeam(tid, targetZone, beforeTid);
          }
        }
        setDragTid(null);
        setDropZone(null);
        setInsertTarget(null);
      } else {
        setSelected(prev => prev === tid ? null : tid);
      }
      dragRef.current = { tid:null, startX:0, startY:0, dragging:false, zoneRef:null, insertRef:null };
    };

    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
  }, [asgn, moveTeam, tm]);

  const poolF = useMemo(() => {
    let ids = asgn[POOL] || [];
    if (confFs.size > 0) ids = ids.filter(id => confFs.has(tm[id]?.conf));
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      ids = ids.filter(id => { const t = tm[id]; return t && (t.name.toLowerCase().includes(q) || t.conf.toLowerCase().includes(q) || String(t.net).includes(q)); });
    }
    ids = ids.filter(id => {
      const t = tm[id];
      if (!t) return false;
      return ["net","sos","kpi","sor","wab","bpi","pom","tRank"].every(k => {
        const val = t[k];
        if (val == null) return true;
        const [mn, mx] = metricRanges[k];
        return val >= mn && val <= mx;
      });
    });
    return ids;
  }, [asgn, confFs, search, tm, metricRanges]);

  const totalPlaced = SEEDS.reduce((s,sd) => s+(asgn[sd.id]?.length||0), 0) + EXTRA_TIERS.reduce((s,t) => s+(asgn[t.id]?.length||0), 0);
  const compareIds = asgn[COMPARE] || [];
  const isSel = !!selected;

  const autoSeed = useCallback(() => {
    const placedNow = SEEDS.reduce((sum, seed) => sum + (asgn[seed.id]?.length || 0), 0)
      + EXTRA_TIERS.reduce((sum, tier) => sum + (asgn[tier.id]?.length || 0), 0);
    if (placedNow > 20 && !window.confirm("This will overwrite many current placements. Continue auto-seeding?")) return;

    const preservedIds = new Set([...(asgn[COMPARE] || []), ...(asgn.ac || []), ...(!includeBubbleTiers ? [...(asgn.ffo || []), ...(asgn.nfo || [])] : [])]);
    const poolIds = teams.map(t => t.id).filter(id => !preservedIds.has(id));
    const poolOrder = new Map(poolIds.map((id, idx) => [id, idx]));
    const netSort = (a, b) => {
      const netDiff = (tm[a]?.net ?? 999) - (tm[b]?.net ?? 999);
      if (netDiff !== 0) return netDiff;
      return (poolOrder.get(a) ?? 0) - (poolOrder.get(b) ?? 0);
    };
    const rankedIds = [...poolIds].sort(netSort);

    const seededTarget = 68;
    const autoQualifiers = [];
    const seenConfs = new Set();
    for (const tid of rankedIds) {
      const conf = tm[tid]?.conf || "__UNKNOWN_CONF__";
      if (!seenConfs.has(conf)) {
        seenConfs.add(conf);
        autoQualifiers.push(tid);
      }
    }

    const aqIds = autoQualifiers.slice(0, seededTarget);
    const aqSet = new Set(aqIds);
    const atLargeTarget = Math.max(0, seededTarget - aqIds.length);
    const atLargeIds = [];
    for (const tid of rankedIds) {
      if (atLargeIds.length >= atLargeTarget) break;
      if (!aqSet.has(tid)) atLargeIds.push(tid);
    }

    const seededSet = new Set([...aqIds, ...atLargeIds]);
    const seededIds = rankedIds.filter(id => seededSet.has(id));
    const remainingPool = rankedIds.filter(id => !seededSet.has(id));
    let seedCursor = 0;
    const takeSeeded = count => {
      const out = seededIds.slice(seedCursor, seedCursor + count);
      seedCursor += out.length;
      return out;
    };
    const takeRemaining = count => remainingPool.splice(0, count);

    setAsgn(prev => {
      const next = { ...prev };
      SEEDS.forEach(seed => {
        const targetCount = (seed.num === 11 || seed.num === 16) ? 6 : 4;
        const teamsForSeed = takeSeeded(targetCount);
        next[seed.id] = teamsForSeed;
      });

      if (includeBubbleTiers) {
        next.ffo = takeRemaining(4);
        next.nfo = takeRemaining(4);
      }

      next[POOL] = remainingPool;
      return next;
    });
    setSelected(null);

    const actualSeeded = seededIds.length;
    setToastMsg(`Placed ${actualSeeded} teams across seed lines.`);
  }, [asgn, includeBubbleTiers, tm, teams]);

  useEffect(() => {
    if (!toastMsg) return;
    const t = setTimeout(() => setToastMsg(""), 1800);
    return () => clearTimeout(t);
  }, [toastMsg]);

  return (
    <div style={{ minHeight:"100vh", background:"#081828", color:"#E2E8F0", fontFamily:"'Segoe UI','Inter',system-ui,sans-serif" }}>

      {/* Ghost — pure DOM, never triggers React re-render */}
      <div ref={ghostRef} style={{
        display:"none", position:"fixed", pointerEvents:"none", zIndex:9999,
        background:"#1A3050", border:"1.5px solid #E8872B", borderRadius:6,
        padding:"5px 10px", fontSize:12, color:"#E2E8F0", whiteSpace:"nowrap",
        boxShadow:"0 4px 20px rgba(0,0,0,0.5)",
      }}/>

      {/* Header */}
      <div style={{ padding:"10px 18px", borderBottom:"1px solid #1A3050", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div>
            <h1 style={{ margin:0, fontSize:20, fontWeight:800, letterSpacing:"-0.03em", background:"linear-gradient(135deg,#E8872B,#F0A855)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>
              Bracketology Hub — The Round Robin
            </h1>
            <p style={{ margin:"2px 0 0", fontSize:10, color:"#4A5568" }}>
              {totalPlaced} placed · {asgn[POOL]?.length||0} pool · {compareIds.length} comparing · Data: {DATA_SCRAPED_AT ? new Date(DATA_SCRAPED_AT).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"}) : "—"}
            </p>
          </div>
        </div>
        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
          <label style={{ display:"flex", alignItems:"center", gap:4, color:"#6B7A90", fontSize:10, cursor:"pointer", userSelect:"none" }}>
            <input
              type="checkbox"
              checked={includeBubbleTiers}
              onChange={e => setIncludeBubbleTiers(e.target.checked)}
              style={{ accentColor:"#E8872B" }}
            />
            include bubble tiers
          </label>
          <button onClick={autoSeed} style={{ background:"#E8872B", border:"1px solid #E8872B", borderRadius:5, color:"#fff", fontSize:10, padding:"3px 10px", cursor:"pointer", fontWeight:700 }}>
            Auto-seed
          </button>
          {selected && <>
            <button onClick={() => setSelected(null)} style={{ background:"#E8872B22", border:"1px solid #E8872B", borderRadius:5, color:"#E8872B", fontSize:10, padding:"3px 10px", cursor:"pointer" }}>
              ✕ Deselect {tm[selected]?.name}
            </button>
            {findZone(selected) !== POOL && (
              <button onClick={() => { moveTeam(selected, POOL); setSelected(null); }} style={{ background:"#1A305088", border:"1px solid #4A6FA5", borderRadius:5, color:"#4A6FA5", fontSize:10, padding:"3px 10px", cursor:"pointer" }}>
                ← Pool
              </button>
            )}
          </>}
          <button onClick={() => {
            const all = []; for (const k in asgn) all.push(...asgn[k]);
            all.sort((a,b) => (tm[a]?.net??999)-(tm[b]?.net??999));
            const n = {}; SEEDS.forEach(s => n[s.id]=[]); EXTRA_TIERS.forEach(t => n[t.id]=[]);
            n[COMPARE]=[]; n[POOL]=all; setAsgn(n); setSelected(null);
            try { localStorage.removeItem("bracketology-board-state"); } catch(e) {}
          }} style={{ background:"transparent", border:"1px solid #1A3050", borderRadius:5, color:"#6B7A90", fontSize:10, padding:"3px 10px", cursor:"pointer" }}>
            Reset
          </button>
        </div>
      </div>

      {/* Main layout */}
      <div style={{ display:"flex", height:"calc(100vh - 66px)", overflow:"hidden" }}>

        {/* Pool sidebar */}
        <div style={{ flex:"0 0 260px", borderRight:"1px solid #1A3050", display:"flex", flexDirection:"column", background:"#0A1E35" }}>
          <div style={{ padding:"8px 10px", borderBottom:"1px solid #1A3050" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search teams..."
              style={{ width:"100%", boxSizing:"border-box", padding:"6px 8px", background:"#0D2240", border:"1px solid #1A3050", borderRadius:5, color:"#E2E8F0", fontSize:12, outline:"none" }}
              onFocus={e => e.target.style.borderColor="#E8872B"}
              onBlur={e => e.target.style.borderColor="#1A3050"}
            />
            <div style={{ fontSize:9, color:"#4A5568", marginTop:4 }}>{poolF.length} teams</div>
          </div>
          <div ref={poolScrollRef} data-zone={POOL} style={{
            flex:1, overflowY:"auto", padding:"4px 6px",
            background: dropZone===POOL ? "rgba(74,111,165,0.06)" : "transparent",
            transition:"background 0.1s",
          }}>
            {poolF.map(id => (
              <TeamCard key={id} tid={id} tm={tm} selected={selected} dragTid={dragTid} onMouseDown={handleMouseDown} zone="pool"/>
            ))}
          </div>
          <div style={{ padding:"8px 10px", borderTop:"1px solid #1A3050", fontSize:9, color:"#4A5568", lineHeight:1.5 }}>
            Data sourced from <a href="https://warrennolan.com" target="_blank" style={{ color:"#4A5568" }}>WarrenNolan.com</a> · Not affiliated with the NCAA or any institution · For informational purposes only · © 2026 The Round Robin
          </div>
        </div>

        {/* Filter panel */}
        <div style={{ flex:"0 0 200px", borderRight:"1px solid #1A3050", display:"flex", flexDirection:"column", background:"#081828", overflowY:"auto" }}>
          <div style={{ padding:"8px 10px", borderBottom:"1px solid #1A3050", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <span style={{ fontSize:11, fontWeight:700, color:"#8694A8", textTransform:"uppercase", letterSpacing:"0.06em" }}>Filters</span>
            {anyFilterActive && <button onClick={clearFilters} style={{ background:"none", border:"none", color:"#E8872B", fontSize:9, cursor:"pointer", padding:0 }}>Clear all</button>}
          </div>
          {/* Conference pills */}
          <div style={{ padding:"8px 10px", borderBottom:"1px solid #1A3050" }}>
            <div style={{ fontSize:9, color:"#4A5568", marginBottom:6, textTransform:"uppercase", letterSpacing:"0.06em" }}>Conference</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:3 }}>
              {allConfs.filter(c => c !== "All").map(c => {
                const active = confFs.has(c);
                return (
                  <button key={c} onClick={() => setConfFs(p => { const n = new Set(p); n.has(c) ? n.delete(c) : n.add(c); return n; })} style={{
                    background: active ? "#E8872B" : "#0D2240",
                    border:`1px solid ${active ? "#E8872B" : "#1A3050"}`,
                    borderRadius:4, color: active ? "#fff" : "#6B7A90",
                    fontSize:10, padding:"3px 7px", cursor:"pointer", fontWeight: active ? 700 : 400,
                    transition:"all 0.1s",
                  }}>{c}</button>
                );
              })}
            </div>
          </div>
          {/* Metric range sliders */}
          <div style={{ padding:"8px 10px", display:"flex", flexDirection:"column", gap:10 }}>
            <div style={{ fontSize:9, color:"#4A5568", textTransform:"uppercase", letterSpacing:"0.06em" }}>Rankings</div>
            {METRICS.map(({key, label}) => {
              const [mn, mx] = metricRanges[key];
              const isDefault = mn === 1 && mx === 400;
              return (
                <div key={key}>
                  <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                    <span style={{ fontSize:9, color: isDefault ? "#4A5568" : "#E8872B", fontWeight: isDefault ? 400 : 600 }}>{label}</span>
                    <span style={{ fontSize:9, color:"#8694A8", fontFamily:"monospace" }}>
                      {isDefault ? "any" : `#${mn} – #${mx}`}
                    </span>
                  </div>
                  <div 
                    onMouseDown={e => {
                      const rect = e.currentTarget.getBoundingClientRect();
                      const pct = (e.clientX - rect.left) / rect.width;
                      const val = Math.round(1 + pct * 399);
                      const [cmn, cmx] = metricRanges[key];
                      const distMin = Math.abs(val - cmn);
                      const distMax = Math.abs(val - cmx);
                      const moveMin = distMin <= distMax;
                      const onMove = mv => {
                        const p2 = Math.max(0, Math.min(1, (mv.clientX - rect.left) / rect.width));
                        const v2 = Math.round(1 + p2 * 399);
                        setMetricRanges(p => {
                          const [a, b] = p[key];
                          return {...p, [key]: moveMin ? [Math.min(v2, b-1), b] : [a, Math.max(v2, a+1)]};
                        });
                      };
                      const onUp = () => { document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
                      document.addEventListener("mousemove", onMove);
                      document.addEventListener("mouseup", onUp);
                      onMove(e);
                    }}
                    style={{ position:"relative", height:24, marginTop:4, cursor:"ew-resize" }}
                  >
                    {/* Track */}
                    <div style={{ position:"absolute", top:"50%", left:0, right:0, height:3, background:"#1A3050", borderRadius:2, transform:"translateY(-50%)", pointerEvents:"none" }}/>
                    {/* Active range */}
                    <div style={{ position:"absolute", top:"50%", height:3, background:"#E8872B", borderRadius:2, transform:"translateY(-50%)", pointerEvents:"none",
                      left: `${((mn-1)/399)*100}%`, right: `${((400-mx)/399)*100}%` }}/>
                    {/* Min thumb */}
                    <div style={{ position:"absolute", top:"50%", left:`${((mn-1)/399)*100}%`, transform:"translate(-50%,-50%)",
                      width:13, height:13, borderRadius:"50%", background:"#E8872B", border:"2px solid #081828",
                      boxShadow:"0 0 0 1.5px #E8872B", pointerEvents:"none" }}/>
                    {/* Max thumb */}
                    <div style={{ position:"absolute", top:"50%", left:`${((mx-1)/399)*100}%`, transform:"translate(-50%,-50%)",
                      width:13, height:13, borderRadius:"50%", background:"#E8872B", border:"2px solid #081828",
                      boxShadow:"0 0 0 1.5px #E8872B", pointerEvents:"none" }}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Board */}
        <div ref={boardScrollRef} style={{ flex:"1 1 62%", overflowY:"auto", padding:"10px 14px 10px 8px" }}>

          {/* Seed lines 1-16 */}
          {SEEDS.map((seed, si) => {
            const ids = asgn[seed.id] || [];
            const color = SEED_COLORS[si] || "#555";
            return (
              <div key={seed.id} style={{ marginBottom:4 }} onClick={() => handleZoneClick(seed.id)}>
                <div style={{ display:"flex", alignItems:"stretch", gap:8, minHeight:40 }}>
                  <div style={{ width:30, minWidth:30, borderRadius:5, background:color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#fff", alignSelf:"stretch", minHeight:40 }}>{seed.num}</div>
                  <div data-zone={seed.id} style={{
                    flex:1, display:"flex", flexWrap:"wrap", gap:2, minHeight:40,
                    borderRadius:6, padding:"2px 4px",
                    border:`1px dashed ${dropZone===seed.id ? "#E8872B" : isSel ? "#E8872B44" : "#1A3050"}`,
                    background: dropZone===seed.id ? "rgba(232,135,43,0.06)" : isSel ? "rgba(232,135,43,0.02)" : "transparent",
                    transition:"background 0.1s, border-color 0.1s",
                  }}>
                    {ids.length === 0 && <span style={{ fontSize:10, color:"#1A3050", padding:"4px 8px" }}>{isSel ? "Click to place" : `${seed.max} slots`}</span>}
                    {ids.map((id, idx) => (
                      <div key={id} style={{ flex:"0 0 auto", minWidth:180, maxWidth:320 }}>
                        {insertTarget?.zone === seed.id && insertTarget?.beforeTid === id && (
                          <div style={{ height:2, background:"#4A6FA5", borderRadius:1, marginBottom:2 }}/>
                        )}
                        <TeamCard tid={id} tm={tm} selected={selected} dragTid={dragTid} onMouseDown={handleMouseDown} zone="board"/>
                        {insertTarget?.zone === seed.id && !insertTarget?.beforeTid && insertTarget?.afterTid === id && idx === ids.length-1 && (
                          <div style={{ height:2, background:"#4A6FA5", borderRadius:1, marginTop:2 }}/>
                        )}
                      </div>
                    ))}
                    {ids.length < seed.max && ids.length > 0 && Array.from({length:Math.min(2,seed.max-ids.length)}).map((_,i) => (
                      <div key={`e-${i}`} style={{ width:80, height:24, borderRadius:4, border:"1px dashed #1A3050", display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:"#1A3050", margin:1 }}>{isSel?"+":" "}</div>
                    ))}
                  </div>
                  <span style={{ fontSize:9, color:"#4A5568", minWidth:20, textAlign:"right", alignSelf:"center" }}>{ids.length}/{seed.max}</span>
                </div>
              </div>
            );
          })}

          <div style={{ height:1, background:"#1A3050", margin:"10px 0" }} />

          {/* Extra tiers */}
          {EXTRA_TIERS.map(tier => {
            const ids = asgn[tier.id] || [];
            return (
              <div key={tier.id} style={{ marginBottom:6 }} onClick={() => handleZoneClick(tier.id)}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                  <div style={{ width:4, height:14, borderRadius:2, background:tier.ac }}/>
                  <span style={{ fontSize:12, fontWeight:700, color:tier.ac }}>{tier.label}</span>
                  <span style={{ fontSize:9, color:"#4A5568" }}>({ids.length})</span>
                </div>
                <div data-zone={tier.id} style={{
                  minHeight:28, borderRadius:6, padding:"2px 4px",
                  border:`1px dashed ${dropZone===tier.id ? "#E8872B" : isSel ? "#E8872B44" : "#1A3050"}`,
                  background: dropZone===tier.id ? "rgba(232,135,43,0.06)" : "transparent",
                  transition:"background 0.1s, border-color 0.1s",
                }}>
                  {ids.length === 0 && <span style={{ fontSize:10, color:"#1A3050", padding:"4px 8px" }}>{isSel ? "Click to place" : "—"}</span>}
                  {ids.map((id, idx) => (
                    <div key={id}>
                      {insertTarget?.zone === tier.id && insertTarget?.beforeTid === id && (
                        <div style={{ height:2, background:"#4A6FA5", borderRadius:1, marginBottom:2 }}/>
                      )}
                      <TeamCard tid={id} tm={tm} selected={selected} dragTid={dragTid} onMouseDown={handleMouseDown} zone="board"/>
                      {insertTarget?.zone === tier.id && !insertTarget?.beforeTid && insertTarget?.afterTid === id && idx === ids.length-1 && (
                        <div style={{ height:2, background:"#4A6FA5", borderRadius:1, marginTop:2 }}/>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}

          <div style={{ height:1, background:"#1A3050", margin:"10px 0" }} />

          {/* Collapsible Compare */}
          <div style={{ marginBottom:16 }}>
            <div onClick={() => setCompareOpen(o => !o)} style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", marginBottom:compareOpen?8:0, userSelect:"none" }}>
              <span style={{ color:"#4A6FA5", fontSize:13, fontWeight:700 }}>{compareOpen ? "▾" : "▸"}</span>
              <span style={{ fontSize:13, fontWeight:700, color:"#4A6FA5" }}>Compare Resumes</span>
              <span style={{ fontSize:9, color:"#4A5568" }}>{compareOpen ? `${compareIds.length}/8` : `${compareIds.length}/8 · click to expand`}</span>
              {!compareOpen && compareIds.length > 0 && (
                <div style={{ display:"flex", gap:4, marginLeft:4 }}>
                  {compareIds.slice(0,4).map(id => (
                    <span key={id} style={{ fontSize:9, color:"#8694A8", background:"#0D2240", border:"1px solid #1A3050", borderRadius:3, padding:"1px 5px" }}>{tm[id]?.name}</span>
                  ))}
                  {compareIds.length > 4 && <span style={{ fontSize:9, color:"#4A5568" }}>+{compareIds.length-4}</span>}
                </div>
              )}
            </div>
            {compareOpen && (
              <div
                data-zone={COMPARE}
                onClick={() => handleZoneClick(COMPARE)}
                style={{
                  minHeight:100, borderRadius:6,
                  border:`1px dashed ${dropZone===COMPARE ? "#4A6FA5" : isSel ? "#4A6FA544" : "#1A3050"}`,
                  background: dropZone===COMPARE ? "rgba(74,111,165,0.08)" : isSel ? "rgba(74,111,165,0.03)" : "transparent",
                  transition:"background 0.1s, border-color 0.1s",
                  padding: compareIds.length===0 ? "0" : "8px",
                  display:"flex", alignItems: compareIds.length===0 ? "center" : "flex-start",
                  justifyContent: compareIds.length===0 ? "center" : "flex-start",
                  overflowX:"auto", gap:8,
                }}>
                {compareIds.length===0 && (
                  <span style={{ fontSize:11, color:"#1A3050" }}>{isSel ? "Click to add to compare" : "Drag or select a team to compare"}</span>
                )}
                {compareIds.map((tid, idx) => {
                  const t = tm[tid];
                  if (!t) return null;
                  const kw = t.keyWins||[];
                  const kl = t.keyLosses||[];
                  return (
                    <div key={tid} style={{ display:"flex", flexShrink:0 }}>
                      {insertTarget?.zone === COMPARE && insertTarget?.beforeTid === tid && (
                        <div style={{ width:3, alignSelf:"stretch", background:"#4A6FA5", borderRadius:1, marginRight:4, minHeight:40 }}/>
                      )}
                      <div data-card={tid} onMouseDown={e => { e.stopPropagation(); handleMouseDown(e, tid); }}
                        style={{ width:195, background:"#0D2240", border:"1px solid #2A4A7A", borderRadius:8, padding:"12px 10px", display:"flex", flexDirection:"column", cursor:"grab" }}>
                        <div style={{ textAlign:"center", marginBottom:8, borderBottom:"1px solid #1A3050", paddingBottom:8 }}>
                          {t.logo && <img src={t.logo} alt="" style={{ width:48, height:48, objectFit:"contain", marginBottom:4, display:"block", margin:"0 auto 4px" }} onError={e => e.target.style.display="none"}/>}
                          <div style={{ color:"#6B7A90", fontFamily:"monospace", fontSize:11 }}>#{t.net}</div>
                          <div style={{ color:"#E2E8F0", fontWeight:800, fontSize:14, lineHeight:1.2 }}>{t.name}</div>
                          <div style={{ color:"#4A5568", fontSize:10, marginTop:2 }}>{t.conf} ({t.confRecord})</div>
                          <div style={{ color:"#8694A8", fontSize:12, fontWeight:700, marginTop:3 }}>{t.record}</div>
                        </div>
                        <div style={{ display:"flex", flexDirection:"column", gap:3, fontSize:11, marginBottom:8 }}>
                          <St l="SOS" v={`#${t.sos}`}/>
                          <St l="NC Rec" v={t.ncRecord}/>
                          <St l="Home" v={t.home}/>
                          <St l="Road" v={t.road}/>
                          <St l="Neutral" v={t.neutral}/>
                          <St l="Avg W" v={`#${t.avgNetWins}`}/>
                          <St l="Avg L" v={`#${t.avgNetLosses}`}/>
                        </div>
                        <div style={{ background:"#081828", borderRadius:5, padding:"6px 8px", marginBottom:8, display:"flex", flexDirection:"column", gap:3, fontSize:11 }}>
                          <St l="Q1" v={t.q1}/><St l="Q2" v={t.q2}/>
                          <St l="Q3" v={t.q3}/><St l="Q4" v={t.q4}/>
                        </div>
                        <div style={{ background:"#0A1E35", borderRadius:5, padding:"6px 8px", marginBottom:8, display:"flex", flexDirection:"column", gap:3, fontSize:11, border:"1px solid #1A3050" }}>
                          <div style={{ fontSize:9, fontWeight:700, color:"#6B7A90", marginBottom:1, textTransform:"uppercase", letterSpacing:"0.05em" }}>Rankings</div>
                          <St l="KPI" v={t.kpi!=null?`#${t.kpi}`:"—"}/><St l="SOR" v={t.sor!=null?`#${t.sor}`:"—"}/>
                          <St l="WAB" v={t.wab!=null?`#${t.wab}`:"—"}/><St l="BPI" v={t.bpi!=null?`#${t.bpi}`:"—"}/>
                          <St l="KenPom" v={t.pom!=null?`#${t.pom}`:"—"}/><St l="T-Rank" v={t.tRank!=null?`#${t.tRank}`:"—"}/>
                        </div>
                        <div style={{ marginBottom:6 }}>
                          <div style={{ fontSize:9, fontWeight:700, color:"#4ADE80", marginBottom:3, textTransform:"uppercase", letterSpacing:"0.05em" }}>Top Wins</div>
                          {kw.length>0 ? kw.map((w,i) => (
                            <div key={i} style={{ fontSize:10, color:"#8694A8", padding:"1px 0", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                              <span style={{ color:"#4ADE80", fontFamily:"monospace", fontSize:9 }}>#{w.oppNet}</span>{" "}{w.site==="A"?"@ ":w.site==="N"?"v ":""}{w.opp} <span style={{color:"#4A5568"}}>{w.score}</span>
                            </div>
                          )) : <div style={{ fontSize:9, color:"#2A4A7A" }}>—</div>}
                        </div>
                        <div style={{ marginBottom:8 }}>
                          <div style={{ fontSize:9, fontWeight:700, color:"#F87171", marginBottom:3, textTransform:"uppercase", letterSpacing:"0.05em" }}>Losses</div>
                          {kl.length>0 ? kl.map((l,i) => (
                            <div key={i} style={{ fontSize:10, color:"#8694A8", padding:"1px 0", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                              <span style={{ color:"#F87171", fontFamily:"monospace", fontSize:9 }}>#{l.oppNet}</span>{" "}{l.site==="A"?"@ ":l.site==="N"?"v ":""}{l.opp} <span style={{color:"#4A5568"}}>{l.score}</span>
                            </div>
                          )) : <div style={{ fontSize:9, color:"#2A4A7A" }}>None</div>}
                        </div>
                        <div style={{ flex:1 }}/>
                        <div onClick={e => e.stopPropagation()} style={{ borderTop:"1px solid #1A3050", paddingTop:6, display:"flex", flexDirection:"column", gap:4 }}>
                          <div style={{ display:"flex", gap:3, flexWrap:"wrap" }}>
                            {SEEDS.map(s => (
                              <button key={s.id} onClick={() => sendFromCompare(tid, s.id)} disabled={asgn[s.id].length>=s.max}
                                style={{ background:"#081828", border:"1px solid #1A3050", borderRadius:3, color:asgn[s.id].length>=s.max?"#1A3050":"#8694A8", fontSize:9, padding:"3px 5px", cursor:asgn[s.id].length>=s.max?"not-allowed":"pointer", minWidth:20, textAlign:"center" }}>
                                {s.num}
                              </button>
                            ))}
                          </div>
                          <div style={{ display:"flex", gap:3 }}>
                            {EXTRA_TIERS.map(et => (
                              <button key={et.id} onClick={() => sendFromCompare(tid, et.id)}
                                style={{ background:"#081828", border:`1px solid ${et.ac}44`, borderRadius:3, color:et.ac, fontSize:9, padding:"3px 5px", cursor:"pointer", flex:1, textAlign:"center" }}>
                                {et.label.split(" ").map(w=>w[0]).join("")}
                              </button>
                            ))}
                            <button onClick={() => moveTeam(tid, POOL)}
                              style={{ background:"#081828", border:"1px solid #1A3050", borderRadius:3, color:"#6B7A90", fontSize:9, padding:"3px 5px", cursor:"pointer", flex:1, textAlign:"center" }}>
                              ← Pool
                            </button>
                          </div>
                        </div>
                      </div>
                      {insertTarget?.zone === COMPARE && !insertTarget?.beforeTid && insertTarget?.afterTid === tid && idx === compareIds.length-1 && (
                        <div style={{ width:3, alignSelf:"stretch", background:"#4A6FA5", borderRadius:1, marginLeft:4, minHeight:40 }}/>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>{/* end board */}
      </div> {/* This closes the "Main layout" flex div */}

      {toastMsg && (
        <div style={{
          position:"fixed", bottom:12, right:14, zIndex:10000,
          background:"#0D2240", border:"1px solid #1A3050", borderRadius:6,
          color:"#E2E8F0", fontSize:11, padding:"6px 10px", boxShadow:"0 6px 18px rgba(0,0,0,0.35)",
        }}>
          {toastMsg}
        </div>
      )}
    </div>
  );
}

function Root() {
  const [teams, setTeams] = useState(null);
  const [error, setError] = useState(null);
  const loadData = useCallback(() => {
    setError(null);
    fetch(DATA_URL)
      .then(r => { if (!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(data => { REAL_TEAMS = data.teams; DATA_SCRAPED_AT = data.meta?.scrapedAt||""; setTeams(data.teams); })
      .catch(e => setError(e.message));
  }, []);
  useEffect(() => { loadData(); }, [loadData]);
  if (error) return <ErrorScreen error={error} onRetry={loadData}/>;
  if (!teams) return <LoadingScreen/>;
  return <App/>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root/>);
</script>
</body>
</html>
