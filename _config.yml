title: The Round Robin
description: Bracket tools and picks built around real resume data.
url: "https://theroundrobin.studio"
baseurl: ""

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - scrape_nitty_gritty.py
  - "*.bak"
  - "*.save"
  - package.json
  - package-lock.json
  - build.js
  - node_modules
  - bracket/src
  - bracket/view/src

keep_files:
  - bracket
  - paymon
  - teams.json
  - favicon.ico

plugins:
  - jekyll-sitemap
