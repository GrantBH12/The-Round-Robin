<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bracketology Nest</title>
<style>
  :root {
    --bg-page:#081828; --bg-sidebar:#0A1E35; --bg-card:#0D2240; --bg-ghost:#1A3050;
    --border:#1A3050; --border-strong:#2A4A7A;
    --text-primary:#E2E8F0; --text-secondary:#8694A8; --text-muted:#6B7A90;
    --text-faint:#4A5568; --text-ghost:#1A3050;
    --accent-green:#4ADE80; --accent-red:#F87171;
  }
  :root.light {
    --bg-page:#F5F7FA; --bg-sidebar:#E2E6EC; --bg-card:#FFFFFF; --bg-ghost:#CBD1DB;
    --border:#C5CDD8; --border-strong:#8FA4BC;
    --text-primary:#0D2240; --text-secondary:#1E3A60; --text-muted:#4A6285;
    --text-faint:#6B7A90; --text-ghost:#A8B5C2;
    --accent-green:#16A34A; --accent-red:#DC2626;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-page); overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-page); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  input:focus { border-color: #E8872B !important; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha512-8Q6Y9XnTbOE+JNvjBQwJ2H8S+UV4uA6hiRykhdtIyDYZ2TprdNmWOUaKdGzOhyr4dCyk287OejbPvwl7lrfqrQ==" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha512-MOCpqoRoisCTwJ8vQQiciZv0qcpROCidek3GTFS6KTk2+y7munJIlKCVkFCYY+p3ErYFXCjmFjnfTTRSC1OHWQ==" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js" integrity="sha512-qoCTmFwBtCPvFhA+WAqatSOrghwpDhFHxwAGh+cppWonXbHA09nG1z5zi4/NGnp8dUhXiVrzA6EnKgJA+fyrpw==" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.5/babel.min.js" integrity="sha512-F62mvp9bPPLjVOpNlD+9erbo9KBRQKkLittcNub5D2o8WfgV9nrJR/0hKc1OUY3LNwlo671inEZzCjnLJz62nw==" crossorigin="anonymous"></script>
<script type="text/babel">
const { useState, useRef, useCallback, useMemo, useEffect, memo } = React;

const DATA_URL = "https://theroundrobin.studio/teams.json";

function LoadingScreen() {
  return (
    <div style={{ minHeight:"100vh", background:"var(--bg-page)", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column" }}>
      <h1 style={{ fontSize:24, fontWeight:800, letterSpacing:"-0.03em", background:"linear-gradient(135deg,#E8872B,#F0A855)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent", fontFamily:"'Segoe UI','Inter',system-ui,sans-serif" }}>The Bracketology Nest</h1>
      <p style={{ color:"var(--text-faint)", fontSize:13, marginTop:8, fontFamily:"'Segoe UI',system-ui,sans-serif" }}>Loading team data...</p>
    </div>
  );
}

function ErrorScreen({ error, onRetry }) {
  return (
    <div style={{ minHeight:"100vh", background:"var(--bg-page)", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", fontFamily:"'Segoe UI','Inter',system-ui,sans-serif" }}>
      <h1 style={{ fontSize:20, color:"var(--accent-red)", marginBottom:8 }}>Failed to load data</h1>
      <p style={{ color:"var(--text-faint)", fontSize:12, marginBottom:16 }}>{error}</p>
      <button onClick={onRetry} style={{ background:"#E8872B", border:"none", borderRadius:6, color:"#fff", fontSize:13, padding:"8px 20px", cursor:"pointer" }}>Retry</button>
    </div>
  );
}

function St({ l, v }) {
  return (
    <div style={{ display:"flex", justifyContent:"space-between" }}>
      <span style={{ color:"var(--text-faint)" }}>{l}</span>
      <span style={{ color:"#E8872B", fontFamily:"monospace" }}>{v}</span>
    </div>
  );
}

const parseWins = s => { const w = parseInt((s||'0-0').split('-')[0]); return isNaN(w) ? 0 : w; };
const parseWinPct = s => { const [w,l]=(s||'0-0').split('-').map(Number); const tot=(w||0)+(l||0); return tot>0?(w||0)/tot:0; };
function getSortDisplay(t, field) {
  if (!t) return '';
  switch(field) {
    case 'net': return t.net != null ? String(t.net) : '';
    case 'wab': return t.wab != null ? String(t.wab) : '';
    case 'winPct': return t.record || '';
    case 'q1wins': return t.q1 || '';
    case 'q2wins': return t.q2 || '';
    case 'q3wins': return t.q3 || '';
    case 'q4wins': return t.q4 || '';
    case 'name': case 'conf': return t.record || '';
    default: { const val = t[field]; return val != null ? `#${val}` : ''; }
  }
}

// TeamCard defined OUTSIDE App — prevents React from remounting scroll containers
const TeamCard = memo(function TeamCard({ tid, tm, selected, dragTid, onMouseDown, zone, poolSort }) {
  const t = tm[tid];
  if (!t) return null;
  const isSel = selected === tid;
  const isDragging = dragTid === tid;
  const inPool = zone === "pool";
  return (
    <div
      data-card={tid}
      onMouseDown={e => { e.stopPropagation(); onMouseDown(e, tid); }}
      onClick={e => e.stopPropagation()}
      style={{
        background: isSel ? "rgba(232,135,43,0.15)" : "var(--bg-card)",
        border: `1.5px solid ${isSel ? "#E8872B" : "var(--border)"}`,
        borderRadius:6, padding:"5px 8px",
        cursor: isDragging ? "grabbing" : "grab",
        userSelect:"none", marginBottom:3, transition: isDragging ? "none" : "all 0.12s",
        boxShadow: isSel ? "0 0 0 1px #E8872B" : "none",
        opacity: isDragging ? 0.35 : 1,
      }}
    >
      <div style={{ display:"flex", alignItems:"center", gap:6, fontSize:12 }}>
        {t.logo && <img src={t.logo} alt="" style={{ width:20, height:20, objectFit:"contain", flexShrink:0 }} onError={e => e.target.style.display="none"}/>}
        <span style={{ color:"var(--text-primary)", fontWeight:600, flex:1, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis", fontSize:12 }}>{t.name}</span>
        <span style={{ color:"var(--text-faint)", fontSize:9 }}>{t.conf}</span>
        {inPool && <span style={{ color:"#E8872B", fontSize:11, fontFamily:"monospace" }}>{getSortDisplay(t, poolSort?.field || 'net')}</span>}
        {!inPool && t.record && <span style={{ color:"#E8872B", fontSize:10, fontFamily:"monospace", fontWeight:600 }}>{t.record}</span>}
      </div>
    </div>
  );
});

let DATA_SCRAPED_AT = "";

const SEEDS = Array.from({length:16},(_,i)=>({id:`seed${i+1}`,label:`${i+1}`,num:i+1,max:(i===10||i===15)?6:4}));
const EXTRA_TIERS = [
  {id:"ffo",label:"First Four Out",ac:"#8B4444",acLight:"#C0392B"},
  {id:"nfo",label:"Next Four Out",ac:"#6B3A3A",acLight:"#A93226"},
  {id:"ac",label:"Also Considered",ac:"#555B6E",acLight:"#3D4F6E"},
];
const COMPARE = "compare";
const POOL = "pool";
const DRAG_THRESHOLD = 6;
const SEED_COLORS = ["#E8872B","#D97A28","#C06128","#A84E26","#4A6FA5","#3D5E8C","#3D5E8C","#304D73","#304D73","#2A4060","#2A4060","#7A5A3A","#7A5A3A","#606060","#606060","#505050"];
const SEED_COLORS_LIGHT = ["#E8872B","#D97A28","#B05520","#9A4020","#3A5C90","#305080","#305080","#26426A","#26426A","#1E3458","#1E3458","#6B4A2A","#6B4A2A","#484848","#484848","#383838"];

const TOUR_STEPS = [
  { targetId: null, title: "Welcome to The Nest", body: "This is The Nest Bracket Studio — 16 years of bracketology process in one tool. Take a quick tour to learn your way around. Use → / ← to navigate, or click the buttons below." },
  { targetId: "trr-pool", title: "Team Pool", body: "Every team in the field starts here. Click a team to select it (orange highlight), then place it with a key or by clicking a seed line. Use ↑ ↓ arrow keys to select without clicking. Search by name or sort by NET, KenPom, Record, and more." },
  { targetId: "trr-filters", title: "Filter Panel", body: "Narrow the pool by conference or ranking thresholds. Click conference pills to filter to one or more leagues. Drag the sliders to set floors and ceilings for NET, SOS, KPI, SOR, WAB, BPI, KenPom, and T-Rank. Click the ◀ arrow to collapse the panel and reclaim screen space." },
  { targetId: "trr-board", title: "Bracket Seedlines", body: "The 68-team field lives here — 16 seed lines, 4 teams each (seeds 11 and 16 hold 6 for First Four play-in games). With a team selected, press the matching key to place it instantly: 1–9, 0=10, -=11, ==12, [=13, ]=14, \\=15, `=16. Or drag teams between slots. Use Auto-Seed by NET to fill the board in one click." },
  { targetId: "trr-compare", title: "Compare Resumes", body: "Press C with any team selected to load it here (up to 8 teams side by side). Full resume metrics — NET, SOS, Q1–Q4 records, KPI, KenPom, and more — appear for each team. A summary table with bar charts appears automatically when 2+ teams are loaded. Press C again or click × to remove a team." },
  { targetId: "trr-bubble", title: "Bubble Tiers", body: "Teams just outside the field go here. Press F for First Four Out, N for Next Four Out, A for Also Considered. These tiers are tracked separately from the bracket and flow into your Paymon Score when you're done building." },
  { targetId: null, title: "Keyboard Shortcuts", isShortcuts: true },
  { targetId: null, title: "You're all set.", body: "Build your bracket, score it with Paymon, and iterate. The ? button in the header restarts this tour anytime. Good luck." },
];

// Returns 0.12–0.90 fill based on value's rank within vals array
function barPct(val, vals, lowerIsBetter) {
  const v = vals.filter(x => x != null && !isNaN(x));
  if (v.length < 2 || val == null) return 0.55;
  const min = Math.min(...v), max = Math.max(...v);
  if (min === max) return 0.55;
  const n = lowerIsBetter ? (max - val) / (max - min) : (val - min) / (max - min);
  return 0.12 + n * 0.78;
}

function StatBar({ label, value, pct }) {
  return (
    <div style={{ display:"flex", alignItems:"center", gap:6, padding:"2px 0" }}>
      <span style={{ color:"var(--text-faint)", fontSize:10, minWidth:30 }}>{label}</span>
      <div style={{ flex:1, position:"relative", height:18, display:"flex", alignItems:"center" }}>
        <div style={{ position:"absolute", left:0, top:1, bottom:1, width:`${Math.round(pct*100)}%`, background:"rgba(232,135,43,0.18)", borderRadius:3 }}/>
        <span style={{ position:"relative", color:"#E8872B", fontFamily:"monospace", fontSize:11, fontWeight:700, paddingLeft:4 }}>{value}</span>
      </div>
    </div>
  );
}

function QTile({ label, val, em }) {
  const parts = (val||'0-0').split('-');
  const w = parseInt(parts[0])||0, l = parseInt(parts[1])||0;
  return (
    <div style={{ flex:1, background:"var(--bg-page)", borderRadius:5, padding:"5px 7px" }}>
      <div style={{ fontSize:9, fontWeight:700, color:"var(--text-faint)", marginBottom:2, textTransform:"uppercase", letterSpacing:"0.04em" }}>{label}</div>
      <div style={{ display:"flex", gap:3, alignItems:"baseline" }}>
        <span style={{ fontSize:em?15:13, fontWeight:800, color:"var(--text-primary)", fontFamily:"monospace", lineHeight:1 }}>{w}</span>
        <span style={{ fontSize:10, color:"var(--border-strong)" }}>-</span>
        <span style={{ fontSize:em?15:13, fontWeight:800, color:"var(--text-secondary)", fontFamily:"monospace", lineHeight:1 }}>{l}</span>
      </div>
    </div>
  );
}

function SectionToggle({ label, open, onToggle, color }) {
  return (
    <div onClick={onToggle} style={{ display:"flex", alignItems:"center", gap:4, cursor:"pointer", padding:"5px 0 3px", userSelect:"none", borderTop:"1px solid var(--border)", marginTop:6 }}>
      <span style={{ color:color||"var(--text-muted)", fontSize:9 }}>{open?"▾":"▸"}</span>
      <span style={{ fontSize:9, fontWeight:700, color:color||"var(--text-muted)", textTransform:"uppercase", letterSpacing:"0.06em" }}>{label}</span>
    </div>
  );
}

const CompareCard = memo(function CompareCard({ tid, tm, asgn, compareIds, insertTarget, sendFromCompare, handleMouseDown, moveTeam, collapseKey, expandKey, onOpenChange, selected, darkMode }) {
  const [powerOpen, setPowerOpen] = useState(true);
  const [recordsOpen, setRecordsOpen] = useState(true);
  const [winsOpen, setWinsOpen] = useState(true);
  useEffect(() => { if (collapseKey > 0) { setPowerOpen(false); setRecordsOpen(false); setWinsOpen(false); } }, [collapseKey]);
  useEffect(() => { if (expandKey > 0) { setPowerOpen(true); setRecordsOpen(true); setWinsOpen(true); } }, [expandKey]);
  const anyOpen = powerOpen || recordsOpen || winsOpen;
  const allOpen = powerOpen && recordsOpen && winsOpen;
  useEffect(() => { onOpenChange(tid, anyOpen, allOpen); }, [tid, anyOpen, allOpen, onOpenChange]);
  const t = tm[tid];
  if (!t) return null;
  const idx = compareIds.indexOf(tid);
  const kw = t.keyWins||[], kl = t.keyLosses||[];
  return (
    <div style={{ display:"flex", flexShrink:0 }}>
      {insertTarget?.zone===COMPARE && insertTarget?.beforeTid===tid && (
        <div style={{ width:3, alignSelf:"stretch", background:"#4A6FA5", borderRadius:1, marginRight:4, minHeight:40 }}/>
      )}
      <div data-card={tid} onMouseDown={e => { e.stopPropagation(); handleMouseDown(e, tid); }} onClick={e => e.stopPropagation()}
        style={{ width:220, background: selected===tid ? "rgba(232,135,43,0.15)" : "var(--bg-card)", border: selected===tid ? "1.5px solid #E8872B" : "1px solid var(--border-strong)", boxShadow: selected===tid ? "0 0 0 1px #E8872B" : "none", borderRadius:8, padding:"10px 10px 8px", display:"flex", flexDirection:"column", cursor:"grab", transition:"all 0.12s" }}>
        {/* Header */}
        <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:10, paddingBottom:8, borderBottom:"1px solid var(--border)" }}>
          {t.logo && <img src={t.logo} alt="" style={{ width:34, height:34, objectFit:"contain", flexShrink:0 }} onError={e => e.target.style.display="none"}/>}
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ color:"var(--text-primary)", fontWeight:800, fontSize:13, lineHeight:1.2, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{t.name}</div>
            <div style={{ color:"var(--text-faint)", fontSize:10, marginTop:1 }}>{t.conf} · {t.confRecord}</div>
          </div>
          <div style={{ textAlign:"right", flexShrink:0 }}>
            <div style={{ background:"rgba(232,135,43,0.12)", border:"1px solid rgba(232,135,43,0.35)", borderRadius:4, padding:"1px 5px", display:"inline-block", marginBottom:2 }}>
              <span style={{ color:"#E8872B", fontFamily:"monospace", fontSize:12, fontWeight:800 }}>#{t.net}</span>
            </div>
            <div style={{ color:"var(--text-secondary)", fontSize:12, fontWeight:700 }}>{t.record}</div>
          </div>
        </div>
        {/* Resume Metrics */}
        <div style={{ marginBottom:8 }}>
          <div style={{ fontSize:9, fontWeight:700, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:3 }}>Key Resume Metrics</div>
          <St l="SOS" v={t.sos!=null?`#${t.sos}`:"—"}/>
          <St l="ncSOS" v={t.ncSos!=null?`#${t.ncSos}`:"—"}/>
          <St l="SOR" v={t.sor!=null?`#${t.sor}`:"—"}/>
          <St l="WAB" v={t.wab!=null?`#${t.wab}`:"—"}/>
        </div>
        {/* Quadrant Records */}
        <div style={{ marginBottom:6 }}>
          <div style={{ fontSize:9, fontWeight:700, color:"var(--text-muted)", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:4 }}>Quadrants</div>
          <div style={{ display:"flex", gap:4, marginBottom:4 }}><QTile label="Q1" val={t.q1} em={true}/><QTile label="Q2" val={t.q2} em={false}/></div>
          <div style={{ display:"flex", gap:4 }}><QTile label="Q3" val={t.q3} em={false}/><QTile label="Q4" val={t.q4} em={false}/></div>
        </div>
        {/* Power Ratings */}
        <SectionToggle label="Power Ratings" open={powerOpen} onToggle={() => setPowerOpen(o=>!o)} color="#4A6FA5"/>
        {powerOpen && (
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"3px 8px", fontSize:11, padding:"4px 2px 6px" }}>
            {[["KPI",t.kpi],["BPI",t.bpi],["KenPom",t.pom],["T-Rank",t.tRank]].map(([l,v]) => (
              <div key={l} style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ color:"var(--text-faint)" }}>{l}</span>
                <span style={{ color:"#E8872B", fontFamily:"monospace" }}>{v!=null?`#${v}`:"—"}</span>
              </div>
            ))}
          </div>
        )}
        {/* Other Records */}
        <SectionToggle label="Other Resume Metrics" open={recordsOpen} onToggle={() => setRecordsOpen(o=>!o)}/>
        {recordsOpen && (
          <div style={{ display:"flex", flexDirection:"column", gap:2, fontSize:11, padding:"4px 2px 6px" }}>
            {[["NC Rec",t.ncRecord],["Home",t.home],["Road",t.road],["Neutral",t.neutral],["Avg W",t.avgNetWins!=null?`#${t.avgNetWins}`:null],["Avg L",t.avgNetLosses!=null?`#${t.avgNetLosses}`:null]].map(([l,v]) => (
              <St key={l} l={l} v={v||"—"}/>
            ))}
          </div>
        )}
        {/* Key Wins / Losses */}
        <SectionToggle label="Key Wins / Losses" open={winsOpen} onToggle={() => setWinsOpen(o=>!o)} color="var(--text-secondary)"/>
        {winsOpen && (
          <div style={{ padding:"4px 2px 6px" }}>
            <div style={{ fontSize:9, fontWeight:700, color:"var(--accent-green)", marginBottom:3, textTransform:"uppercase" }}>Top Wins</div>
            {Array.from({length:5}).map((_,i) => {
              const w = kw[i];
              return w ? (
                <div key={i} style={{ fontSize:10, color:"var(--text-secondary)", padding:"1px 0", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                  <span style={{ color:"var(--accent-green)", fontFamily:"monospace", fontSize:9 }}>#{w.oppNet}</span>{" "}{w.site==="A"?"@ ":w.site==="N"?"v ":""}{w.opp} <span style={{color:"var(--text-faint)"}}>{w.score}</span>
                </div>
              ) : <div key={i} style={{ fontSize:10, color:"var(--text-ghost)", padding:"1px 0" }}>—</div>;
            })}
            <div style={{ fontSize:9, fontWeight:700, color:"var(--accent-red)", margin:"5px 0 3px", textTransform:"uppercase" }}>Losses</div>
            {Array.from({length:5}).map((_,i) => {
              const l = kl[i];
              return l ? (
                <div key={i} style={{ fontSize:10, color:"var(--text-secondary)", padding:"1px 0", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
                  <span style={{ color:"var(--accent-red)", fontFamily:"monospace", fontSize:9 }}>#{l.oppNet}</span>{" "}{l.site==="A"?"@ ":l.site==="N"?"v ":""}{l.opp} <span style={{color:"var(--text-faint)"}}>{l.score}</span>
                </div>
              ) : <div key={i} style={{ fontSize:10, color:"var(--text-ghost)", padding:"1px 0" }}>—</div>;
            })}
          </div>
        )}
        <div style={{ flex:1, minHeight:8 }}/>
        {/* Action buttons */}
        <div onClick={e => e.stopPropagation()} style={{ borderTop:"1px solid var(--border)", paddingTop:6, display:"flex", flexDirection:"column", gap:4 }}>
          <div style={{ display:"flex", gap:3, flexWrap:"wrap" }}>
            {SEEDS.map(s => (
              <button key={s.id} onClick={() => sendFromCompare(tid, s.id)} disabled={asgn[s.id].length>=s.max}
                style={{ background:"var(--bg-page)", border:"1px solid var(--border)", borderRadius:3, color:asgn[s.id].length>=s.max?"var(--text-ghost)":"var(--text-secondary)", fontSize:9, padding:"3px 5px", cursor:asgn[s.id].length>=s.max?"not-allowed":"pointer", minWidth:20, textAlign:"center" }}>
                {s.num}
              </button>
            ))}
          </div>
          <div style={{ display:"flex", gap:3 }}>
            {EXTRA_TIERS.map(et => { const c = darkMode ? et.ac : et.acLight; return (
              <button key={et.id} onClick={() => sendFromCompare(tid, et.id)}
                style={{ background:"var(--bg-page)", border:`1px solid ${c}44`, borderRadius:3, color:c, fontSize:9, padding:"3px 5px", cursor:"pointer", flex:1, textAlign:"center" }}>
                {et.label.split(" ").map(w=>w[0]).join("")}
              </button>
            );})}
            <button onClick={() => moveTeam(tid, POOL)}
              style={{ background:"var(--bg-page)", border:"1px solid var(--border)", borderRadius:3, color:"var(--text-muted)", fontSize:9, padding:"3px 5px", cursor:"pointer", flex:1, textAlign:"center" }}>
              ← Pool
            </button>
          </div>
        </div>
      </div>
      {insertTarget?.zone===COMPARE && !insertTarget?.beforeTid && insertTarget?.afterTid===tid && idx===compareIds.length-1 && (
        <div style={{ width:3, alignSelf:"stretch", background:"#4A6FA5", borderRadius:1, marginLeft:4, minHeight:40 }}/>
      )}
    </div>
  );
});

function App({ teams }) {
  const tm = useMemo(() => Object.fromEntries(teams.map(t => [t.id, t])), [teams]);
  const allConfs = useMemo(() => ["All", ...[...new Set(teams.map(t => t.conf))].sort()], [teams]);

  const [asgn, setAsgn] = useState(() => {
    const a = {};
    SEEDS.forEach(s => a[s.id] = []);
    EXTRA_TIERS.forEach(t => a[t.id] = []);
    a[COMPARE] = [];
    a[POOL] = teams.map(t => t.id);
    return a;
  });
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    (async () => {
      try {
        const urlParam = new URLSearchParams(window.location.search).get('b');
        const val = urlParam
          ? LZString.decompressFromEncodedURIComponent(urlParam)
          : localStorage.getItem("bracketology-board-state");
        if (val) {
          const saved = JSON.parse(val);
          const allIds = new Set(teams.map(t => t.id));
          const usedIds = new Set();
          let valid = true;
          for (const k in saved) {
            if (!Array.isArray(saved[k])) { valid = false; break; }
            for (const id of saved[k]) {
              if (!allIds.has(id) || usedIds.has(id)) { valid = false; break; }
              usedIds.add(id);
            }
          }
          if (valid && usedIds.size > 0) {
            const missing = teams.filter(t => !usedIds.has(t.id)).map(t => t.id);
            // Safeguard for newly added zones preventing LocalStorage crashes
            if (!saved[POOL]) saved[POOL] = [];
            if (!saved[COMPARE]) saved[COMPARE] = [];
            SEEDS.forEach(s => { if (!saved[s.id]) saved[s.id] = []; });
            EXTRA_TIERS.forEach(t => { if (!saved[t.id]) saved[t.id] = []; });
            
            saved[POOL] = [...saved[POOL], ...missing];
            setAsgn(saved);
          }
        }
      } catch(e) {}
      setLoaded(true);
      try { if (!localStorage.getItem("bracketology-tour-seen")) setTourStep(0); } catch(e) {}
    })();
  }, [teams]);

  useEffect(() => {

  const [search, setSearch] = useState("");

  const METRICS = [

  const anyFilterActive = confFs.size > 0 || Object.values(metricRanges).some(([mn,mx]) => mn > 1 || mx < 400);
  const clearFilters = () => {
    setConfFs(new Set());

  const [selected, setSelected] = useState(null);
  const [poolSort, setPoolSort] = useState({ field: 'net', dir: 'asc' });
  const [includeBubbleTiers, setIncludeBubbleTiers] = useState(false);

  const [compareOpen, setCompareOpen] = useState(true);

  });
  const toggleMode = useCallback(() => {

      return next;
    });

  const [viewportWidth, setViewportWidth] = useState(() => (typeof window !== "undefined" ? window.innerWidth : 1280));

  const moveTeam = useCallback((tid, target, beforeTid = null) => {
    setAsgn(p => {
      const n = {};
      for (const k in p) n[k] = p[k].filter(x => x !== tid);

  const autoSeed = useCallback(() => {
    // Always work from the full 128-team list regardless of current board state
    const sortedByNet = [...teams.map(t => t.id)].sort((a,b) => (tm[a]?.net??999)-(tm[b]?.net??999));

    // One guaranteed entry per conference (best NET)
    const seenConf = new Set();
    const autoQSet = new Set();
    for (const id of sortedByNet) {
      const conf = tm[id]?.conf;
      if (conf && !seenConf.has(conf)) { seenConf.add(conf); autoQSet.add(id); }
    }

    const totalCap = SEEDS.reduce((s,sd) => s+sd.max, 0);
    const atLargePool = sortedByNet.filter(id => !autoQSet.has(id));
    const atLargeIn = new Set(atLargePool.slice(0, Math.max(0, totalCap - autoQSet.size)));

    // Field = auto qualifiers + at-large, ordered by NET
    const fieldSet = new Set([...autoQSet, ...atLargeIn]);
    const field = sortedByNet.filter(id => fieldSet.has(id));

    const newAsgn = {};
    SEEDS.forEach(s => newAsgn[s.id] = []);
    EXTRA_TIERS.forEach(t => newAsgn[t.id] = []);
    newAsgn[COMPARE] = [...asgn[COMPARE]];

    const placed = new Set();
    let fIdx = 0;
    for (const seed of SEEDS) {
      for (let i = 0; i < seed.max && fIdx < field.length; i++, fIdx++) {
        newAsgn[seed.id].push(field[fIdx]);
        placed.add(field[fIdx]);
      }
    }

    let ffoCount = 0, nfoCount = 0;
    if (includeBubbleTiers) {
      const remaining = sortedByNet.filter(id => !placed.has(id));
      for (let i = 0; i < 4 && i < remaining.length; i++) {
        newAsgn['ffo'].push(remaining[i]);
        placed.add(remaining[i]);
        ffoCount++;
      }
      for (let i = ffoCount; i < ffoCount + 4 && i < remaining.length; i++) {
        newAsgn['nfo'].push(remaining[i]);
        placed.add(remaining[i]);
        nfoCount++;
      }
    }

    newAsgn[POOL] = sortedByNet.filter(id => !placed.has(id));
    setAsgn(newAsgn);
    setSelected(null);

    const placedCount = fIdx;
    const msg = `Auto-seeded ${placedCount} teams · ${autoQSet.size} conf champs · ${atLargeIn.size} at-large${includeBubbleTiers ? ` · ${ffoCount} FFO · ${nfoCount} NFO` : ''}`;
    setToastMsg(msg);
  }, [asgn, tm, teams, includeBubbleTiers]);

  useEffect(() => {
    if (!toastMsg) return;
    const t = setTimeout(() => setToastMsg(""), 4000);
    return () => clearTimeout(t);
  }, [toastMsg]);

  useEffect(() => {
    const onKey = e => {
      const tag = e.target?.tagName;
      if (tag === "INPUT" || tag === "TEXTAREA") return;
      if (tourStep !== null) {
        if (e.key === "Escape") { finishTour(); return; }
        if (e.key === "ArrowRight" || e.key === "Enter") {
          setTourStep(s => { const n = s + 1; if (n >= TOUR_STEPS.length) { try { localStorage.setItem("bracketology-tour-seen","1"); } catch(e2) {} return null; } return n; });
          return;
        }
        if (e.key === "ArrowLeft") { setTourStep(s => Math.max(0, s - 1)); return; }
        return;
      }
      if (e.key === "Escape") { if (helpOpen) { setHelpOpen(false); return; } setSelected(null); return; }
      if (!selected) {
        // No selection: arrows start selecting from pool/compare
        if (e.key === "ArrowDown" && poolF.length > 0) { e.preventDefault(); setSelected(poolF[0]); }
        if (e.key === "ArrowRight" && compareIds.length > 0) { e.preventDefault(); setSelected(compareIds[0]); }
        return;
      }
      const poolIdx = poolF.indexOf(selected);
      const cmpIdx = compareIds.indexOf(selected);
      if (e.key === "ArrowDown") {
        e.preventDefault();
        if (poolIdx >= 0) setSelected(poolF[Math.min(poolIdx + 1, poolF.length - 1)]);
        else if (poolF.length > 0) setSelected(poolF[0]);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        if (poolIdx > 0) setSelected(poolF[poolIdx - 1]);
        else if (poolIdx === 0) setSelected(null);
      } else if (e.key === "ArrowRight" || e.key === "ArrowLeft") {
        e.preventDefault();
        const isRight = e.key === "ArrowRight";
        const seedZone = SEEDS.find(s => (asgn[s.id]||[]).includes(selected));
        if (seedZone) {
          const zoneList = asgn[seedZone.id];
          const idx = zoneList.indexOf(selected);
          if (e.shiftKey) {
            // Shift+arrow: reorder within seed line
            if (isRight && idx < zoneList.length - 1) {
              const beforeTid = idx + 2 < zoneList.length ? zoneList[idx + 2] : null;
              moveTeam(selected, seedZone.id, beforeTid);
            } else if (!isRight && idx > 0) {
              moveTeam(selected, seedZone.id, zoneList[idx - 1]);
            }
          } else {
            // Navigate within seed line
            if (isRight && idx < zoneList.length - 1) setSelected(zoneList[idx + 1]);
            else if (!isRight && idx > 0) setSelected(zoneList[idx - 1]);
          }
        } else {
          // Compare navigation
          if (isRight) {
            if (cmpIdx >= 0) setSelected(compareIds[Math.min(cmpIdx + 1, compareIds.length - 1)]);
            else if (compareIds.length > 0) setSelected(compareIds[0]);
          } else {
            if (cmpIdx > 0) setSelected(compareIds[cmpIdx - 1]);
            else if (cmpIdx === 0) setSelected(null);
          }
        }
      } else if (e.key === "c" || e.key === "C") {
        if (compareIds.length < 8 && !compareIds.includes(selected)) {
          moveTeam(selected, COMPARE); setSelected(null);
        }
      } else if (e.key === "Backspace" || e.key === "Delete") {
        const zone = Object.keys(asgn).find(k => asgn[k].includes(selected));
        if (zone && zone !== POOL) { moveTeam(selected, POOL); setSelected(null); }
      } else {
        const KEY_ZONE = {
          "1":"seed1","2":"seed2","3":"seed3","4":"seed4","5":"seed5",
          "6":"seed6","7":"seed7","8":"seed8","9":"seed9","0":"seed10",
          "-":"seed11","=":"seed12","[":"seed13","]":"seed14","\\":"seed15","`":"seed16",
          "f":"ffo","F":"ffo","n":"nfo","N":"nfo","a":"ac","A":"ac",
        };
        const target = KEY_ZONE[e.key];
        if (target) { moveTeam(selected, target); setSelected(null); }
      }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [selected, tourStep, helpOpen, poolF, compareIds, asgn, moveTeam, finishTour]);

  const handleZoneClick = useCallback(zoneId => {
    if (!selected) return;
    const seed = SEEDS.find(s => s.id === zoneId);
    // Seed rows are uncapped for manual placement
    if (zoneId === COMPARE && asgn[COMPARE].length >= 8 && !asgn[COMPARE].includes(selected)) return;
    moveTeam(selected, zoneId);
    setSelected(null);
  }, [selected, asgn, moveTeam]);

  const sendFromCompare = useCallback((tid, target) => {
    moveTeam(tid, target);
  }, [moveTeam]);

  const fillCompare = useCallback(() => {
    const slotsLeft = 8 - compareIds.length;
    if (slotsLeft <= 0) return;
    const poolTeams = new Set(asgn[POOL] || []);
    const eligible = poolF.filter(id => poolTeams.has(id) && !compareIds.includes(id));
    const toAdd = eligible.slice(0, slotsLeft);
    toAdd.forEach(id => moveTeam(id, COMPARE));
  }, [compareIds, poolF, asgn, moveTeam]);

  const handleMouseDown = useCallback((e, tid) => {
    if (e.button !== 0) return;
    e.preventDefault();
    dragRef.current = { tid, startX:e.clientX, startY:e.clientY, dragging:false, zoneRef:null, insertRef:null };

    const onMouseMove = (mv) => {
      const dx = mv.clientX - dragRef.current.startX;
      const dy = mv.clientY - dragRef.current.startY;
      if (!dragRef.current.dragging && Math.sqrt(dx*dx+dy*dy) > DRAG_THRESHOLD) {
        dragRef.current.dragging = true;
        if (ghostRef.current) {
          ghostRef.current.textContent = `#${tm[tid]?.net}  ${tm[tid]?.name}`;
          ghostRef.current.style.left = (mv.clientX+12)+"px";
          ghostRef.current.style.top = (mv.clientY-10)+"px";
          ghostRef.current.style.display = "block";
        }
        setDragTid(tid);
        setSelected(null);
      }
      if (dragRef.current.dragging) {
        if (ghostRef.current) {
          ghostRef.current.style.left = (mv.clientX+12)+"px";
          ghostRef.current.style.top = (mv.clientY-10)+"px";
        }
        // Find which zone we're over
        let foundZone = null;
        const zoneEls = document.querySelectorAll("[data-zone]");
        for (const el of zoneEls) {
          const r = el.getBoundingClientRect();
          if (mv.clientX>=r.left && mv.clientX<=r.right && mv.clientY>=r.top && mv.clientY<=r.bottom) {
            foundZone = el.getAttribute("data-zone"); break;
          }
        }
        // Find insert position within zone by hit-testing individual cards
        let foundInsert = null;
        if (foundZone && foundZone !== POOL) {
          const cardEls = document.querySelectorAll("[data-card]");
          for (const el of cardEls) {
            const cardTid = el.getAttribute("data-card");
            if (cardTid === tid) continue;
            const r = el.getBoundingClientRect();
            if (mv.clientX>=r.left && mv.clientX<=r.right && mv.clientY>=r.top && mv.clientY<=r.bottom) {
              const midY = r.top + r.height / 2;
              const midX = r.left + r.width / 2;
              // For compare zone (horizontal), use X axis; for seed lines (wrapping), use Y
              const insertBefore = foundZone === COMPARE ? mv.clientX < midX : mv.clientY < midY;
              foundInsert = { zone: foundZone, beforeTid: insertBefore ? cardTid : null, afterTid: insertBefore ? null : cardTid };
              break;
            }
          }
        }
        const zoneChanged = foundZone !== dragRef.current.zoneRef;
        const insertKey = foundInsert ? `${foundInsert.beforeTid}:${foundInsert.afterTid}` : null;
        const prevInsertKey = dragRef.current.insertRef ? `${dragRef.current.insertRef.beforeTid}:${dragRef.current.insertRef.afterTid}` : null;
        if (zoneChanged || insertKey !== prevInsertKey) {
          dragRef.current.zoneRef = foundZone;
          dragRef.current.insertRef = foundInsert;
          setDropZone(foundZone);
          setInsertTarget(foundInsert);
        }
      }
    };

    const onMouseUp = () => {
      document.removeEventListener("mousemove", onMouseMove);
      document.removeEventListener("mouseup", onMouseUp);
      if (ghostRef.current) ghostRef.current.style.display = "none";
      if (dragRef.current.dragging) {
        const targetZone = dragRef.current.zoneRef;
        const insert = dragRef.current.insertRef;
        if (targetZone) {
          const seed = SEEDS.find(s => s.id === targetZone);
          // Seed rows are uncapped for manual placement; only compare zone has a cap
          const atMax = !seed && targetZone === COMPARE && asgn[COMPARE].length >= 8 && !asgn[COMPARE].includes(tid);
          if (!atMax) {
            let beforeTid = null;
            if (insert && insert.zone === targetZone) {
              if (insert.beforeTid) {
                beforeTid = insert.beforeTid;
              } else if (insert.afterTid) {
                const zoneList = asgn[targetZone].filter(x => x !== tid);
                const afterIdx = zoneList.indexOf(insert.afterTid);
                beforeTid = afterIdx >= 0 && afterIdx + 1 < zoneList.length ? zoneList[afterIdx + 1] : null;
              }

            moveTeam(tid, targetZone, beforeTid);
          }
        }
        setDragTid(null);
        setDropZone(null);
        setInsertTarget(null);

        setSelected(prev => prev === tid ? null : tid);

      dragRef.current = { tid:null, startX:0, startY:0, dragging:false, zoneRef:null, insertRef:null };
    };

    document.addEventListener("mousemove", onMouseMove);
    document.addEventListener("mouseup", onMouseUp);
  }, [asgn, moveTeam, tm]);

  const POOL_SORT_OPTS = [
    {field:'net',label:'NET',defDir:'asc'},{field:'kpi',label:'KPI',defDir:'asc'},
    {field:'sor',label:'SOR',defDir:'asc'},{field:'bpi',label:'BPI',defDir:'asc'},
    {field:'pom',label:'KenPom',defDir:'asc'},{field:'tRank',label:'T-Rank',defDir:'asc'},
    {field:'wab',label:'WAB',defDir:'desc'},{field:'sos',label:'SOS',defDir:'asc'},
    {field:'ncSos',label:'ncSOS',defDir:'asc'},{field:'name',label:'Name',defDir:'asc'},
    {field:'conf',label:'Conf',defDir:'asc'},{field:'winPct',label:'Record',defDir:'desc'},
    {field:'q1wins',label:'Q1W',defDir:'desc'},{field:'q2wins',label:'Q2W',defDir:'desc'},
    {field:'q3wins',label:'Q3W',defDir:'desc'},{field:'q4wins',label:'Q4W',defDir:'desc'},
  ];

  const poolF = useMemo(() => {
    let ids = asgn[POOL] || [];
    if (confFs.size > 0) ids = ids.filter(id => confFs.has(tm[id]?.conf));
    if (search.trim()) {
      const q = search.trim().toLowerCase();
      ids = ids.filter(id => { const t = tm[id]; return t && (t.name.toLowerCase().includes(q) || t.conf.toLowerCase().includes(q) || String(t.net).includes(q)); });
    }
    ids = ids.filter(id => {
      const t = tm[id];
      if (!t) return false;
      return ["net","sos","kpi","sor","wab","bpi","pom","tRank"].every(k => {
        const val = t[k];
        if (val == null) return true;
        const [mn, mx] = metricRanges[k];
        return val >= mn && val <= mx;
      });
    });
    const { field, dir } = poolSort;
    return [...ids].sort((a, b) => {
      const ta = tm[a]; const tb = tm[b];
      if (field === 'name') { const va=ta?.name||''; const vb=tb?.name||''; return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va); }
      if (field === 'conf') { const va=ta?.conf||''; const vb=tb?.conf||''; return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va); }
      let va, vb;
      if (field === 'winPct') { va=parseWinPct(ta?.record); vb=parseWinPct(tb?.record); }
      else if (field === 'q1wins') { va=parseWins(ta?.q1); vb=parseWins(tb?.q1); }
      else if (field === 'q2wins') { va=parseWins(ta?.q2); vb=parseWins(tb?.q2); }
      else if (field === 'q3wins') { va=parseWins(ta?.q3); vb=parseWins(tb?.q3); }
      else if (field === 'q4wins') { va=parseWins(ta?.q4); vb=parseWins(tb?.q4); }
      else { va=ta?.[field]??999; vb=tb?.[field]??999; }
      return dir==='asc' ? va-vb : vb-va;
    });
  }, [asgn, confFs, search, tm, metricRanges, poolSort]);

  const totalPlaced = SEEDS.reduce((s,sd) => s+(asgn[sd.id]?.length||0), 0) + EXTRA_TIERS.reduce((s,t) => s+(asgn[t.id]?.length||0), 0);
  const compareIds = asgn[COMPARE] || [];
  const isSel = !!selected;

  return (
    <div style={{ minHeight:"100vh", background:"var(--bg-page)", color:"var(--text-primary)", fontFamily:"'Segoe UI','Inter',system-ui,sans-serif" }}>

      {/* Ghost — pure DOM, never triggers React re-render */}
      <div ref={ghostRef} style={{
        display:"none", position:"fixed", pointerEvents:"none", zIndex:9999,
        background:"var(--bg-ghost)", border:"1.5px solid #E8872B", borderRadius:6,
        padding:"5px 10px", fontSize:12, color:"var(--text-primary)", whiteSpace:"nowrap",
        boxShadow:"0 4px 20px rgba(0,0,0,0.5)",
      }}/>

      {/* Toast */}
      {toastMsg && (
        <div style={{
          position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)",
          background:"var(--bg-ghost)", border:"1px solid #E8872B", borderRadius:8,
          padding:"10px 20px", fontSize:12, color:"var(--text-primary)",
          boxShadow:"0 4px 20px rgba(0,0,0,0.5)", zIndex:10000,
          pointerEvents:"none", whiteSpace:"nowrap",
        }}>
          {toastMsg}
        </div>
      )}

      {/* Help Modal */}
      {helpOpen && (
        <div onClick={() => setHelpOpen(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", zIndex:20000, display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
          <div onClick={e => e.stopPropagation()} style={{ background:"var(--bg-sidebar)", border:"1px solid var(--border)", borderRadius:10, padding:"24px 28px", maxWidth:580, width:"100%", maxHeight:"82vh", overflowY:"auto", position:"relative", boxShadow:"0 8px 40px rgba(0,0,0,0.45)", fontFamily:"'Segoe UI','Inter',system-ui,sans-serif" }}>
            <button onClick={() => setHelpOpen(false)} style={{ position:"absolute", top:14, right:16, background:"none", border:"none", color:"var(--text-muted)", fontSize:18, cursor:"pointer", lineHeight:1, padding:0 }}>✕</button>
            <h2 style={{ margin:"0 0 4px", fontSize:17, fontWeight:800, background:"linear-gradient(135deg,#E8872B,#F0A855)", WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>The Bracketology Nest</h2>
            <p style={{ color:"var(--text-faint)", fontSize:11, margin:"0 0 14px" }}>Interactive bracket prediction &amp; resume comparison tool for college basketball</p>
            <button onClick={() => { setHelpOpen(false); setTourStep(0); }} style={{ display:"flex", alignItems:"center", gap:8, width:"100%", background:"rgba(232,135,43,0.08)", border:"1px solid rgba(232,135,43,0.35)", borderRadius:7, padding:"10px 14px", marginBottom:18, cursor:"pointer", textAlign:"left" }}>
              <span style={{ fontSize:16 }}>▶</span>

              <span style={{ fontSize:9, color:"var(--text-faint)" }}>{compareOpen ? `${compareIds.length}/8` : `${compareIds.length}/8 · click to expand`}</span>
              {compareOpen && (
                <div style={{ marginLeft:"auto", display:"flex", gap:6 }} onClick={e => e.stopPropagation()}>
                  {compareIds.length < 8 && poolF.length > 0 && (
                    <button onClick={fillCompare}
                      style={{ background:"rgba(74,111,165,0.12)", border:"1px solid #2A4A7A", borderRadius:4, color:"#4A6FA5", fontSize:11, fontWeight:700, padding:"4px 12px", cursor:"pointer" }}>
                      Fill With Top Teams
                    </button>
                  )}
                  {compareIds.length > 0 && (() => {
                    const allCollapsed = compareIds.every(id => cardOpenMap[id]?.any === false);
                    const allExpanded  = compareIds.every(id => cardOpenMap[id]?.all === true);
                    const btnStyle = (active) => ({
                      background: active ? "#4A6FA5" : "none",
                      border: active ? "none" : "1px solid var(--border)",
                      borderRadius:4, color: active ? "#fff" : "var(--text-faint)",
                      fontSize:9, padding:"2px 8px", cursor: active ? "pointer" : "default",
                    });
                    return (
                      <>
                        <button onClick={() => !allCollapsed && setCollapseKey(k => k+1)} style={btnStyle(!allCollapsed)}>
                          Collapse All Team Cards
                        </button>
                        <button onClick={() => !allExpanded && setExpandKey(k => k+1)} style={btnStyle(!allExpanded)}>
                          Expand All Team Cards
                        </button>
                      </>
                    );
                  })()}
                </div>
              )}
              {!compareOpen && compareIds.length > 0 && (
                <div style={{ display:"flex", gap:4, marginLeft:4 }}>
                  {compareIds.slice(0,4).map(id => (
                    <span key={id} style={{ fontSize:9, color:"var(--text-secondary)", background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:3, padding:"1px 5px" }}>{tm[id]?.name}</span>
                  ))}
                  {compareIds.length > 4 && <span style={{ fontSize:9, color:"var(--text-faint)" }}>+{compareIds.length-4}</span>}
                </div>
              )}
            </div>
            {compareOpen && (() => {
              const allNet  = compareIds.map(id => tm[id]?.net).filter(v => v!=null);
              const allSos  = compareIds.map(id => tm[id]?.sos).filter(v => v!=null);
              const allSor  = compareIds.map(id => tm[id]?.sor).filter(v => v!=null);
              const allWab  = compareIds.map(id => tm[id]?.wab).filter(v => v!=null);
              const allKpi  = compareIds.map(id => tm[id]?.kpi).filter(v => v!=null);
              const allBpi  = compareIds.map(id => tm[id]?.bpi).filter(v => v!=null);
              const allPom  = compareIds.map(id => tm[id]?.pom).filter(v => v!=null);
              const allTrk  = compareIds.map(id => tm[id]?.tRank).filter(v => v!=null);
              const bestNet = allNet.length ? Math.min(...allNet) : null;
              const bestSos = allSos.length ? Math.min(...allSos) : null;
              const bestSor = allSor.length ? Math.min(...allSor) : null;
              const bestWab = allWab.length ? Math.min(...allWab) : null;
              const bestKpi = allKpi.length ? Math.min(...allKpi) : null;
              const bestBpi = allBpi.length ? Math.min(...allBpi) : null;
              const bestPom = allPom.length ? Math.min(...allPom) : null;
              const bestTrk = allTrk.length ? Math.min(...allTrk) : null;
              return (
                <>
                  {/* Summary table — shown when 2+ teams */}
                  {compareIds.length >= 2 && (
                    <div style={{ marginBottom:10, background:"var(--bg-page)", borderRadius:6, border:"1px solid var(--border)", overflow:"hidden" }}>
                      <div style={{ display:"flex", borderBottom:"1px solid var(--border)" }}>
                        <div style={{ width:44, flexShrink:0, padding:"5px 6px", fontSize:9, fontWeight:700, color:"var(--text-faint)", textTransform:"uppercase", letterSpacing:"0.04em", textAlign:"right" }}>NET</div>
                        <div style={{ flex:2, minWidth:110, flexShrink:0, padding:"5px 8px", fontSize:9, fontWeight:700, color:"var(--text-faint)", textTransform:"uppercase", letterSpacing:"0.06em" }}>Team</div>
                        {["Q1","Q2","Q3","Q4"].map(q => (
                          <div key={q} style={{ flex:1, padding:"5px 6px", fontSize:9, fontWeight:700, color:"var(--text-faint)", textTransform:"uppercase", letterSpacing:"0.04em", minWidth:44 }}>{q}</div>
                        ))}
                        {["SOS","SOR","WAB","KPI","BPI","KenPom","T-Rank"].map(col => (
                          <div key={col} style={{ flex:1, padding:"5px 6px", fontSize:9, fontWeight:700, color:"var(--text-faint)", textTransform:"uppercase", letterSpacing:"0.04em", textAlign:"left", minWidth:50 }}>{col}</div>
                        ))}
                      </div>
                      {compareIds.map(id => {
                        const t = tm[id]; if (!t) return null;
                        const Cell = ({ val, pct, best }) => (
                          <div style={{ flex:1, position:"relative", padding:"5px 6px", minWidth:50, display:"flex", alignItems:"center", justifyContent:"flex-start" }}>
                            <div style={{ position:"absolute", left:0, top:2, bottom:2, width:`${Math.round(pct*100)}%`, background:best?"rgba(232,135,43,0.26)":"rgba(74,111,165,0.18)", borderRadius:2 }}/>
                            <span style={{ position:"relative", zIndex:1, fontSize:10, fontFamily:"monospace", color:best?"#E8872B":"var(--text-secondary)", fontWeight:best?700:400 }}>{val}</span>
                          </div>
                        );
                        return (
                          <div key={id} style={{ display:"flex", borderBottom:"1px solid var(--bg-sidebar)", alignItems:"center" }}>
                            <div style={{ width:44, flexShrink:0, padding:"5px 6px", textAlign:"right" }}>
                              <span style={{ fontSize:10, fontFamily:"monospace", color:t.net===bestNet?"#E8872B":"var(--text-secondary)", fontWeight:t.net===bestNet?700:400 }}>{t.net!=null?`#${t.net}`:"—"}</span>
                            </div>
                            <div style={{ flex:2, minWidth:110, flexShrink:0, padding:"5px 8px", display:"flex", alignItems:"center", gap:3 }}>
                              {t.logo && <img src={t.logo} alt="" style={{ width:16, height:16, objectFit:"contain", flexShrink:0 }} onError={e=>e.target.style.display="none"}/>}
                              <span style={{ fontSize:10, color:"var(--text-primary)", fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{t.name}</span>
                              <span style={{ fontSize:9, fontFamily:"monospace", color:"var(--text-muted)", flexShrink:0 }}>{t.record}</span>
                            </div>
                            {[t.q1,t.q2,t.q3,t.q4].map((v,i) => (
                              <div key={i} style={{ flex:1, padding:"5px 6px", minWidth:44 }}>
                                <span style={{ fontSize:11, fontFamily:"monospace", color:"var(--text-secondary)" }}>{v||"—"}</span>
                              </div>
                            ))}
                            <Cell val={t.sos!=null?`#${t.sos}`:"—"} pct={barPct(t.sos,allSos,true)} best={t.sos===bestSos}/>
                            <Cell val={t.sor!=null?`#${t.sor}`:"—"} pct={barPct(t.sor,allSor,true)} best={t.sor===bestSor}/>
                            <Cell val={t.wab!=null?`#${t.wab}`:"—"} pct={barPct(t.wab,allWab,true)} best={t.wab===bestWab}/>
                            <Cell val={t.kpi!=null?`#${t.kpi}`:"—"} pct={barPct(t.kpi,allKpi,true)} best={t.kpi===bestKpi}/>
                            <Cell val={t.bpi!=null?`#${t.bpi}`:"—"} pct={barPct(t.bpi,allBpi,true)} best={t.bpi===bestBpi}/>
                            <Cell val={t.pom!=null?`#${t.pom}`:"—"} pct={barPct(t.pom,allPom,true)} best={t.pom===bestPom}/>
                            <Cell val={t.tRank!=null?`#${t.tRank}`:"—"} pct={barPct(t.tRank,allTrk,true)} best={t.tRank===bestTrk}/>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {/* Drop zone with redesigned cards */}
                  <div
                    data-zone={COMPARE}
                    onClick={() => handleZoneClick(COMPARE)}
                    style={{
                      minHeight:100, borderRadius:6,
                      border:`1px dashed ${dropZone===COMPARE ? "#4A6FA5" : isSel ? "#4A6FA544" : "var(--border)"}`,
                      background: dropZone===COMPARE ? "rgba(74,111,165,0.08)" : isSel ? "rgba(74,111,165,0.03)" : "transparent",
                      transition:"background 0.1s, border-color 0.1s",
                      padding: compareIds.length===0 ? "0" : "8px",
                      display:"flex", alignItems: compareIds.length===0 ? "center" : "flex-start",
                      justifyContent: compareIds.length===0 ? "center" : "flex-start",
                      overflowX:"auto", gap:8,
                    }}>
                    {compareIds.length===0 && (
                      <span style={{ fontSize:11, color:"var(--text-ghost)" }}>{isSel ? "Click to add to compare" : "Drag or select a team to compare"}</span>
                    )}
                    {compareIds.map(id => (
                      <CompareCard key={id} tid={id} tm={tm} asgn={asgn} compareIds={compareIds}
                        insertTarget={insertTarget} sendFromCompare={sendFromCompare}
                        handleMouseDown={handleMouseDown} moveTeam={moveTeam} collapseKey={collapseKey} expandKey={expandKey} onOpenChange={handleCardOpenChange} selected={selected} darkMode={darkMode}/>
                    ))}
                  </div>
                </>
              );
            })()}
          </div>

          <div style={{ height:2, background:"linear-gradient(90deg,#4A6FA5,var(--border))", margin:"0 0 8px", borderRadius:1 }}/>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
            <div style={{ fontSize:11, fontWeight:700, color:"var(--text-secondary)", textTransform:"uppercase", letterSpacing:"0.06em" }}>Bracket Seedlines</div>
            <div style={{ display:"flex", gap:5, alignItems:"center" }}>
              <label style={{ display:"flex", alignItems:"center", gap:4, fontSize:10, color:"var(--text-muted)", cursor:"pointer", userSelect:"none" }}>
                <input type="checkbox" checked={includeBubbleTiers} onChange={e => setIncludeBubbleTiers(e.target.checked)} style={{ accentColor:"#E8872B", cursor:"pointer" }}/>
                Bubble
              </label>
              <button onClick={autoSeed} style={{ background:"var(--bg-card)", border:"1px solid var(--border)", borderRadius:6, color:"var(--text-muted)", fontSize:9, fontWeight:700, minHeight:44, padding:"10px 10px", cursor:"pointer", letterSpacing:"0.03em", textTransform:"uppercase", whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:5 }}>
                <span style={{ fontSize:12, lineHeight:1 }}>⚡</span>{isNarrowHeader ? "Auto NET" : "Auto-Seed by NET"}
              </button>
            </div>
          </div>

          {/* Seed lines 1-16 */}
          {SEEDS.map((seed, si) => {
            const ids = asgn[seed.id] || [];
            const color = seedColors[si] || "#555";
            const emptyCount = seed.max - ids.length;
            const isFull = ids.length >= seed.max;
            const zoneBorder = `1px solid ${dropZone===seed.id ? "#E8872B" : isSel ? "#E8872B55" : isFull ? color+"66" : "transparent"}`;
            // 6-slot lines: 4 per row so 5th/6th wrap; 4-slot lines: fill single row
            const slotFlex = seed.max === 6 && ids.length > 4 ? "0 0 calc(25% - 2px)" : "1";
            return (
              <div key={seed.id} style={{ marginBottom:4 }} onClick={() => handleZoneClick(seed.id)}>
                <div style={{ display:"flex", alignItems:"stretch", gap:8, minHeight:40 }}>
                  <div style={{ width:30, minWidth:30, borderRadius:5, background:color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#fff", alignSelf:"stretch", minHeight:40 }}>{seed.num}</div>
                  <div data-zone={seed.id} style={{
                    flex:1, display:"flex", flexWrap:"wrap", gap:2, minHeight:40,
                    borderRadius:6, padding:"2px 4px",
                    border: zoneBorder,
                    background: dropZone===seed.id ? "rgba(232,135,43,0.06)" : isSel ? "rgba(232,135,43,0.02)" : "transparent",
                    transition:"background 0.1s, border-color 0.1s",
                  }}>
                    {ids.map((id, idx) => (
                      <div key={id} style={{ flex:slotFlex, minWidth:120 }}>
                        {insertTarget?.zone === seed.id && insertTarget?.beforeTid === id && (
                          <div style={{ height:2, background:"#4A6FA5", borderRadius:1, marginBottom:2 }}/>
                        )}
                        <TeamCard tid={id} tm={tm} selected={selected} dragTid={dragTid} onMouseDown={handleMouseDown} zone="board"/>
                        {insertTarget?.zone === seed.id && !insertTarget?.beforeTid && insertTarget?.afterTid === id && idx === ids.length-1 && (
                          <div style={{ height:2, background:"#4A6FA5", borderRadius:1, marginTop:2 }}/>
                        )}
                      </div>
                    ))}
                    {emptyCount > 0 && Array.from({length:emptyCount}).map((_,i) => (
                      <div key={`e-${i}`} style={{ flex:slotFlex, minWidth:120, height:34, borderRadius:5, border:`1px dashed ${color}44`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:9, color:`${color}66`, margin:1 }}>{isSel ? "+" : ""}</div>
                    ))}
                  </div>
                  <span style={{ fontSize:9, color: ids.length >= seed.max ? "#E85555" : "var(--text-faint)", minWidth:20, textAlign:"right", alignSelf:"center" }}>{ids.length}/{seed.max}</span>
                </div>
              </div>
            );
          })}

          <div id="trr-bubble">
          <div style={{ height:1, background:"var(--border)", margin:"10px 0" }} />

          {/* Extra tiers */}
          {EXTRA_TIERS.map(tier => {
            const ids = asgn[tier.id] || [];
            return (
              <div key={tier.id} style={{ marginBottom:6 }} onClick={() => handleZoneClick(tier.id)}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:3 }}>
                  <div style={{ width:4, height:14, borderRadius:2, background:darkMode?tier.ac:tier.acLight }}/>
                  <span style={{ fontSize:12, fontWeight:700, color:darkMode?tier.ac:tier.acLight }}>{tier.label}</span>
                  <span style={{ fontSize:9, color:"var(--text-faint)" }}>({ids.length})</span>
                </div>
                <div data-zone={tier.id} style={{
                  minHeight:28, borderRadius:6, padding:"2px 4px",
                  border:`1px dashed ${dropZone===tier.id ? "#E8872B" : isSel ? "#E8872B44" : "var(--border)"}`,
                  background: dropZone===tier.id ? "rgba(232,135,43,0.06)" : "transparent",
                  transition:"background 0.1s, border-color 0.1s",
                }}>
                  {ids.length === 0 && <span style={{ fontSize:10, color:"var(--text-ghost)", padding:"4px 8px" }}>{isSel ? "Click to place" : "—"}</span>}
                  {ids.map((id, idx) => (
                    <div key={id}>
                      {insertTarget?.zone === tier.id && insertTarget?.beforeTid === id && (
                        <div style={{ height:2, background:"#4A6FA5", borderRadius:1, marginBottom:2 }}/>
                      )}
                      <TeamCard tid={id} tm={tm} selected={selected} dragTid={dragTid} onMouseDown={handleMouseDown} zone="board"/>
                      {insertTarget?.zone === tier.id && !insertTarget?.beforeTid && insertTarget?.afterTid === id && idx === ids.length-1 && (
                        <div style={{ height:2, background:"#4A6FA5", borderRadius:1, marginTop:2 }}/>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
          </div>{/* end trr-bubble */}
        </div>{/* end board */}
      </div>{/* end main layout */}
    </div>
  );
}

function Root() {
  const [teams, setTeams] = useState(null);
  const [error, setError] = useState(null);
  const loadData = useCallback(() => {
    setError(null);
    fetch(DATA_URL)
      .then(r => { if (!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(data => { DATA_SCRAPED_AT = data.meta?.scrapedAt||""; setTeams(data.teams); })
      .catch(e => setError(e.message));
  }, []);
  useEffect(() => { loadData(); }, [loadData]);
  if (error) return <ErrorScreen error={error} onRetry={loadData}/>;
  if (!teams) return <LoadingScreen/>;
  return <App teams={teams}/>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Root/>);
</script>
</body>
</html>
