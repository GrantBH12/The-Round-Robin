<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="../favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Bracketology Nest</title>
<meta name="description" content="The Nest: Bracketology Studio — build your bracket with live NET data, compare team resumes, and track the bubble.">
<meta property="og:title" content="The Nest: Bracketology Studio · The Round Robin">
<meta property="og:description" content="Build your bracket with live Warren Nolan NET data. Compare team resumes, filter by any metric, and track the bubble.">
<meta property="og:image" content="https://theroundrobin.studio/assets/img/logo-01.png">
<meta property="og:url" content="https://theroundrobin.studio/bracket/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<style>
  :root {
    --bg-page:#081828; --bg-sidebar:#0A1E35; --bg-card:#0D2240; --bg-ghost:#1A3050;
    --border:#1A3050; --border-strong:#2A4A7A;
    --text-primary:#E2E8F0; --text-secondary:#8694A8; --text-muted:#6B7A90;
    --text-faint:#4A5568; --text-ghost:#1A3050;
    --accent-green:#4ADE80; --accent-red:#F87171;
  }
  :root.light {
    --bg-page:#F5F7FA; --bg-sidebar:#E2E6EC; --bg-card:#FFFFFF; --bg-ghost:#CBD1DB;
    --border:#C5CDD8; --border-strong:#8FA4BC;
    --text-primary:#0D2240; --text-secondary:#1E3A60; --text-muted:#4A6285;
    --text-faint:#6B7A90; --text-ghost:#A8B5C2;
    --accent-green:#16A34A; --accent-red:#DC2626;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-page); overflow: hidden; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-page); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  input:focus { border-color: #E8872B !important; }
  /* Shortcut tooltips */
  [data-tooltip] { position: relative; }
  [data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: var(--bg-card); border: 1px solid rgba(232,135,43,0.4);
    color: var(--text-secondary); font-size: 10px; font-family: monospace;
    white-space: nowrap; padding: 3px 7px; border-radius: 4px;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
    z-index: 200;
  }
  [data-tooltip]:hover::after, [data-tooltip]:focus-visible::after { opacity: 1; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" integrity="sha512-8Q6Y9XnTbOE+JNvjBQwJ2H8S+UV4uA6hiRykhdtIyDYZ2TprdNmWOUaKdGzOhyr4dCyk287OejbPvwl7lrfqrQ==" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" integrity="sha512-MOCpqoRoisCTwJ8vQQiciZv0qcpROCidek3GTFS6KTk2+y7munJIlKCVkFCYY+p3ErYFXCjmFjnfTTRSC1OHWQ==" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js" integrity="sha512-qoCTmFwBtCPvFhA+WAqatSOrghwpDhFHxwAGh+cppWonXbHA09nG1z5zi4/NGnp8dUhXiVrzA6EnKgJA+fyrpw==" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
